<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Backlog Therapy</title>
<link rel="icon" type="image/png" href="icon-512.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&family=Noto+Sans+Arabic:wght@500;700&family=Noto+Sans+JP:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03030a;--bg2:#07070f;--bg3:#0c0c18;--bg4:#111120;--border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.1);--text:#dde0f0;--muted:#383855;--muted2:#5a5a80;--accent:#ff2d6b;--accent2:#7c3aed}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body.rtl{direction:rtl;font-family:'Noto Sans Arabic',sans-serif}
body.ja{font-family:'Noto Sans JP',sans-serif}
body.zh{font-family:'Noto Sans SC',sans-serif}
body::before{content:'';position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:9997}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:9999}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a1a35;border-radius:2px}
.hdr{position:sticky;top:0;z-index:100;background:rgba(3,3,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:4px;color:#fff;flex-shrink:0}
.logo em{color:var(--accent);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:2px;display:flex;align-items:center;gap:10px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lang-wrap{position:relative}
.lang-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .15s;white-space:nowrap}
.lang-btn:hover{border-color:rgba(255,45,107,.4);color:#ccc}
.lang-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;overflow:hidden;display:none;min-width:140px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.lang-wrap.open .lang-dropdown{display:block}
.lang-opt{padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--muted2);cursor:pointer;transition:background .1s,color .1s}
.lang-opt:hover{background:rgba(255,45,107,.1);color:#fff}
.lang-opt.active{color:var(--accent)}
.hero{position:relative;padding:80px 48px 60px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 50%,rgba(124,58,237,.06),transparent),radial-gradient(ellipse 50% 80% at 20% 60%,rgba(255,45,107,.05),transparent);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
.hero-inner{position:relative;max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap}
.hero-tag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:4px;margin-bottom:16px;opacity:.8}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(32px,5vw,60px);font-weight:900;line-height:1.05;color:#fff;margin-bottom:12px}
.hero-title span{color:var(--accent)}
.hero-sub{font-family:'Rajdhani',sans-serif;font-size:16px;color:var(--muted2);font-weight:500;max-width:420px;line-height:1.6}
.hero-stats{display:flex;gap:2px;flex-wrap:wrap}
.hstat{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:20px 28px;min-width:120px;position:relative;overflow:hidden;transition:border-color .2s}
.hstat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.hstat:hover{border-color:rgba(255,45,107,.3)}
.hstat-lbl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;color:var(--muted2);margin-bottom:8px}
.hstat-val{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#fff}
.hstat-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);margin-top:4px}
.main{max-width:1100px;margin:0 auto;padding:0 48px 80px}
.filter-bar{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:28px;padding:20px 24px;background:var(--bg3);border:1px solid var(--border);border-radius:12px}
.filter-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
.filter-lbl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;color:var(--muted2)}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .12s;user-select:none}
.chip.on{background:rgba(255,45,107,.12);border-color:rgba(255,45,107,.45);color:#ff7a9a}
.chip:hover:not(.on){border-color:rgba(255,255,255,.15);color:#aaa}
.filter-sep{width:1px;background:var(--border2);align-self:stretch;margin:0 4px}
.clear-btn{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;background:none;border:1px solid var(--border2);color:var(--muted2);padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s;align-self:flex-end;margin-top:18px}
.clear-btn:hover{color:#ccc;border-color:rgba(255,255,255,.2)}
.search-row{margin-bottom:16px}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;padding:11px 16px;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:rgba(255,45,107,.45)}
.results-info{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;margin-bottom:16px}
#list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.game-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.game-card:hover{border-color:rgba(255,45,107,.4);transform:translateY(-2px)}
.game-card-top{height:3px;background:linear-gradient(90deg,var(--c,#ff2d6b),transparent)}
.game-card-body{padding:16px 18px}
.game-card-score{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--c,#ff2d6b);margin-bottom:6px;display:flex;align-items:baseline;gap:6px}
.game-card-score big{font-size:28px;filter:drop-shadow(0 0 6px var(--c,#ff2d6b))}
.game-card-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.game-card-meta{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted2);margin-bottom:8px}
.gtag{font-size:10px;padding:2px 8px;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;border:1px solid}
.cat-bars{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.cat-bar-row{display:flex;align-items:center;gap:6px}
.cat-bar-lbl{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;color:var(--muted2);min-width:72px;flex-shrink:0}
.cat-bar-track{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px}
.cat-bar-fill{height:100%;border-radius:2px}
.cat-bar-val{font-family:'Share Tech Mono',monospace;font-size:8px;width:20px;text-align:right;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:780px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:10;transition:color .15s}
.modal-close:hover{color:#fff}
.modal-hero{position:relative;padding:40px;overflow:hidden;border-bottom:1px solid var(--border)}
.modal-body{padding:28px 40px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:24px}
.cat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.lbl{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--muted2);margin-bottom:8px}
.empty{text-align:center;padding:80px;color:var(--muted2);font-size:15px}
.loading{text-align:center;padding:100px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:3px}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px currentColor}50%{text-shadow:0 0 50px currentColor,0 0 100px currentColor}}
.score-glow{animation:glowPulse 3s ease-in-out infinite}
.score-sliders{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;margin-top:6px}
.sslider-row{display:flex;align-items:center;gap:8px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:6px 10px}
.sslider-lbl{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--muted2);width:72px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sslider-inp{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.08);outline:none;cursor:pointer}
.sslider-inp::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(255,45,107,.6)}
.sslider-val{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);width:16px;text-align:right;flex-shrink:0}
.top-cat-chip{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .12s;user-select:none}
.top-cat-chip.on{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.5);color:#c4b5fd}
.score-filter-body{display:none}
.score-filter-body.open{display:flex;flex-direction:column;gap:10px;width:100%}
.filter-expand-row{width:100%;display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.filter-expand-btn{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;background:none;border:1px solid var(--border2);color:var(--muted2);padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .15s}
.filter-expand-btn:hover{color:#ccc;border-color:rgba(255,255,255,.2)}
.filter-visibility-btn{display:flex;align-items:center;gap:7px;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);padding:8px 14px;border-radius:6px;cursor:pointer;margin-bottom:14px;transition:all .15s}
.filter-visibility-btn:hover{color:#ccc;border-color:rgba(255,255,255,.2)}
.filter-visibility-btn.has-active{border-color:rgba(255,45,107,.45);color:#ff7a9a}
.filter-bar{display:none}
.filter-bar.open{display:flex}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">BACKLOG<em>THERAPY</em></div>
  <div class="hdr-right">
    <div class="hdr-meta"><span class="hdr-dot"></span><span id="hdr-count">—</span></div>
    <div class="lang-wrap" id="lang-wrap">
      <button class="lang-btn" onclick="toggleLang()">🌐 <span id="lang-label">EN</span> ▾</button>
      <div class="lang-dropdown">
        <div class="lang-opt" onclick="setLang('en')">🇬🇧 English</div>
        <div class="lang-opt" onclick="setLang('ar')">🇩🇿 العربية</div>
        <div class="lang-opt" onclick="setLang('fr')">🇫🇷 Français</div>
        <div class="lang-opt" onclick="setLang('es')">🇪🇸 Español</div>
        <div class="lang-opt" onclick="setLang('ja')">🇯🇵 日本語</div>
        <div class="lang-opt" onclick="setLang('zh')">🇨🇳 中文</div>
      </div>
    </div>
  </div>
</div>
<div class="hero">
  <div class="hero-bg"></div><div class="hero-grid"></div>
  <div class="hero-inner">
    <div>
      <div class="hero-tag" id="t-tag"></div>
      <div class="hero-title" id="t-title-wrap"><span id="t-line1"></span><br><span id="t-line2" style="color:var(--accent)"></span></div>
      <div class="hero-sub" id="t-sub"></div>
    </div>
    <div class="hero-stats" id="hero-stats"><div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:3px;padding:20px 0">...</div></div>
  </div>
</div>
<div class="main">
  <div class="filter-bar" id="filter-bar">
    <div class="filter-group"><div class="filter-lbl" id="t-genre"></div><div class="chips" id="chips-genre"></div></div>
    <div class="filter-sep"></div>
    <div class="filter-group"><div class="filter-lbl" id="t-platform"></div><div class="chips" id="chips-platform"></div></div>
    <div class="filter-sep"></div>
    <div class="filter-group"><div class="filter-lbl" id="t-perspective"></div><div class="chips" id="chips-perspective"></div></div>
    <div class="filter-sep"></div>
    <div class="filter-expand-row">
      <button class="filter-expand-btn" id="score-expand-btn" onclick="toggleScoreFilters()">⚡ SCORE FILTERS ▾</button>
      <button class="clear-btn" id="t-clear" onclick="clearFilters()"></button>
    </div>
    <div class="score-filter-body" id="score-filter-body">
      <div>
        <div class="filter-lbl" id="t-topcatfilter">TOP CATEGORY</div>
        <div class="chips" id="chips-topcat"></div>
      </div>
      <div>
        <div class="filter-lbl" id="t-scoremin">MIN SCORE BY CATEGORY</div>
        <div class="score-sliders" id="score-sliders"></div>
      </div>
    </div>
  </div>
  <div id="filter-toggle-wrap" style="display:none"><button class="filter-visibility-btn" id="filter-vis-btn" onclick="toggleFilterBar()">⚙ <span id="filter-vis-lbl">SHOW FILTERS</span></button></div>
  <div class="search-row"><input class="search-inp" id="search" oninput="render()"/></div>
  <div class="results-info" id="results-info"></div>
  <div id="list"><div class="loading">...</div></div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal"><button class="modal-close" onclick="closeModal()">×</button><div id="modal-content"></div></div>
</div>
<script>

function buildStats(){
  const t=T[LANG]||T.en;el=document.getElementById('hero-stats');
  if(!LOG.length){el.innerHTML='';document.getElementById('hdr-count').textContent='0';return;}
  const avgS=r2(LOG.reduce((a,e)=>a+e.finalScore,0)/LOG.length);
  const top=Math.max(...LOG.map(e=>e.finalScore));
  const rec=LOG.filter(e=>e.recommend).length;
  document.getElementById('hdr-count').textContent=LOG.length+' '+t.games;
  el.innerHTML=[[t.rated,LOG.length,t.games],[t.avg,avgS.toFixed(2),slbl(avgS)],[t.top,top.toFixed(2),slbl(top)],[t.rec,rec,Math.round(rec/LOG.length*100)+'%']]
    .map(([l,v,s])=>'<div class="hstat"><div class="hstat-lbl">'+l+'</div><div class="hstat-val">'+v+'</div><div class="hstat-sub">'+s+'</div></div>').join('');

      const cats=Object.keys(subs).filter(c=>c!=='multiplayer'||e.hasMP);
      if(!cats.length)return false;
      const topCat=cats.reduce((best,c)=>{const s=subs[c]&&subs[c].length?r2(avg(subs[c].map(x=>x.score))):0;return s>(subs[best]&&subs[best].length?r2(avg(subs[best].map(x=>x.score))):0)?c:best;},cats[0]);
      if(!F.topCat.has(topCat))return false;
    }
    // per-category min score filter
    for(const [cat,minS] of Object.entries(F.scoreMin)){
      if(!minS)continue;
      const subs=(e.subs||{})[cat]||[];
      const cs=subs.length?r2(avg(subs.map(s=>s.score))):0;
      if(cs<minS)return false;
    }
    return true;
  });
  const hasF=F.genres.size||F.platforms.size||F.perspectives.size||F.topCat.size||Object.values(F.scoreMin).some(v=>v>0)||q;
  updateFilterVisBtn();
  document.getElementById('results-info').textContent=hasF?filtered.length+' '+t.of+' '+LOG.length+' '+t.games:LOG.length+' '+t.games;
  const list=document.getElementById('list');list.innerHTML='';
  if(!filtered.length){list.innerHTML='<div class="empty">'+(LOG.length?t.noMatch:t.noGames)+'</div>';return;}
  filtered.forEach(e=>{
    const clr=sc(e.finalScore);
    const ac=Object.keys(e.subs||{}).filter(c=>c!=='multiplayer'||e.hasMP);
    const card=document.createElement('div');card.className='game-card';card.style.setProperty('--c',clr);
    card.innerHTML='<div class="game-card-top"></div><div class="game-card-body"><div class="game-card-score"><big>'+e.finalScore+'</big><span style="color:var(--muted2)">'+slbl(e.finalScore)+'</span></div><div class="game-card-title">'+e.title+'</div><div class="game-card-meta">'+e.platform+(e.date?' · '+e.date:'')+(e.playTime?' · '+e.playTime+'h':'')+'</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">'+(e.genres||[]).map(g=>'<span class="gtag" style="color:rgba(255,107,138,.9);border-color:rgba(255,45,107,.3);background:rgba(255,45,107,.07)">'+genreLabel(g)+'</span>').join('')+(e.perspective?'<span class="gtag" style="color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.07)">'+perspLabel(e.perspective)+'</span>':'')+(e.recommend!=null?'<span style="font-size:13px;margin-left:2px">'+(e.recommend?'✅':'❌')+'</span>':'')+'</div>'+(ac.length?'<div class="cat-bars">'+ac.slice(0,6).map(cat=>{const subs=(e.subs||{})[cat]||[];const cs=subs.length?r2(avg(subs.map(s=>s.score))):5;const m=CAT_META[cat]||{color:'#ff2d6b',label:cat};return'<div class="cat-bar-row"><div class="cat-bar-lbl">'+catLabel(cat)+'</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:'+cs*10+'%;background:'+m.color+';opacity:.7"></div></div><div class="cat-bar-val" style="color:'+sc(cs)+'">'+cs+'</div></div>';}).join('')+'</div>':'')+'</div>';
    card.onclick=()=>openModal(e);list.appendChild(card);
  });
}
function openModal(e){
  const t=T[LANG]||T.en;const clr=sc(e.finalScore);
  const ac=Object.keys(e.subs||{}).filter(c=>c!=='multiplayer'||e.hasMP);
  document.getElementById('modal-content').innerHTML='<div class="modal-hero"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,'+clr+','+clr+'44,transparent)"></div><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,'+clr+'08,transparent 60%);pointer-events:none"></div><div style="position:relative"><div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--accent);letter-spacing:3px;margin-bottom:12px;opacity:.7">'+e.platform+(e.date?' // '+e.date:'')+(e.playTime?' // '+e.playTime+'HRS':'')+'</div><div style="font-family:\'Orbitron\',sans-serif;font-size:clamp(20px,3vw,34px);font-weight:900;color:#fff;margin-bottom:24px;line-height:1.1">'+e.title+'</div><div style="display:flex;align-items:flex-end;gap:32px;flex-wrap:wrap"><div><div class="score-glow" style="font-family:\'Orbitron\',sans-serif;font-size:80px;font-weight:900;color:'+clr+';line-height:1">'+e.finalScore+'</div><div style="font-family:\'Rajdhani\',sans-serif;font-size:14px;color:'+clr+';margin-top:6px;font-weight:700;letter-spacing:2px">'+slbl(e.finalScore).toUpperCase()+'</div></div><div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">'+(e.genres||[]).map(g=>'<span class="gtag" style="font-size:12px;color:rgba(255,107,138,.9);border-color:rgba(255,45,107,.4);background:rgba(255,45,107,.1);padding:4px 12px">'+genreLabel(g)+'</span>').join('')+'</div>'+(e.perspective?'<div style="font-family:\'Rajdhani\',sans-serif;font-size:13px;color:#a78bfa;margin-bottom:8px;font-weight:700">'+perspLabel(e.perspective)+'</div>':'')+(e.recommend!=null?'<div style="font-family:\'Rajdhani\',sans-serif;font-size:14px;font-weight:700;color:'+(e.recommend?'#4ade80':'#ff4d6d')+'">'+(e.recommend?t.yes_rec:t.no_rec)+'</div>':'')+'</div></div></div></div>'+'<div class="modal-body">'+(ac.length?'<div class="lbl">'+t.breakdown+'</div><div class="cat-grid">'+ac.map(cat=>{const subs=(e.subs||{})[cat]||[];const cs=subs.length?r2(avg(subs.map(s=>s.score))):5;const w=(e.fw||{})[cat]||0;const m=CAT_META[cat]||{label:cat,icon:'',color:'#ff2d6b'};return'<div class="cat-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,'+m.color+',transparent)"></div><div style="font-family:\'Orbitron\',sans-serif;font-size:8px;color:'+m.color+';letter-spacing:1px;margin-bottom:8px;padding-top:4px">'+m.icon+' '+catLabel(cat).toUpperCase()+'</div><div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px"><div style="font-family:\'Orbitron\',sans-serif;font-size:24px;font-weight:900;color:'+sc(cs)+'">'+cs+'</div><div style="text-align:right"><div style="font-family:\'Share Tech Mono\',monospace;font-size:8px;color:var(--muted2)">w:'+w+'%</div><div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:'+m.color+'88">+'+(cs*w/100).toFixed(2)+'</div></div></div><div style="height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:10px"><div style="height:100%;width:'+cs*10+'%;background:'+m.color+';border-radius:2px;opacity:.7"></div></div>'+subs.map((s,i)=>'<div style="display:flex;justify-content:space-between;font-family:\'Rajdhani\',sans-serif;font-size:12px;margin-bottom:3px"><span style="color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">'+subLabel(cat,i)+'</span><span style="color:'+sc(s.score)+';font-weight:700;flex-shrink:0">'+s.score+'</span></div>').join('')+'</div>';}).join('')+'</div>':'')+(e.verdict?'<div style="background:var(--bg3);border:1px solid var(--border);border-left:3px solid rgba(255,45,107,.5);border-radius:8px;padding:16px 20px"><div class="lbl">'+t.verdict+'</div><div style="font-family:\'Rajdhani\',sans-serif;font-size:15px;color:#c0c0d8;line-height:1.7">'+e.verdict+'</div></div>':'')+'</div>';
  document.getElementById('modal').classList.add('open');
}
function closeModal(ev){if(!ev||ev.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}
const savedLang=localStorage.getItem('bt_lang')||'en';
setLang(savedLang);
loadLog();
</script>
