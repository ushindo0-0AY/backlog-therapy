<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Backlog Therapy</title>
<link rel="icon" type="image/png" href="icon-512.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03030a;--bg2:#07070f;--bg3:#0c0c18;--bg4:#111120;--border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.1);--text:#dde0f0;--muted:#383855;--muted2:#5a5a80;--accent:#ff2d6b;--accent2:#7c3aed;--accent3:#00d4ff}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:9997}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:9999}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a1a35;border-radius:2px}
.hdr{position:sticky;top:0;z-index:100;background:rgba(3,3,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:4px;color:#fff}
.logo em{color:var(--accent);font-style:normal}
.hdr-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:2px;display:flex;align-items:center;gap:16px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero{position:relative;padding:80px 48px 60px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 50%,rgba(124,58,237,.06),transparent),radial-gradient(ellipse 50% 80% at 20% 60%,rgba(255,45,107,.05),transparent);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
.hero-inner{position:relative;max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap}
.hero-tag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:4px;margin-bottom:16px;opacity:.8}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(36px,5vw,64px);font-weight:900;line-height:1;color:#fff;margin-bottom:12px}
.hero-title span{color:var(--accent);display:block}
.hero-sub{font-family:'Rajdhani',sans-serif;font-size:16px;color:var(--muted2);font-weight:500;max-width:400px;line-height:1.6}
.hero-stats{display:flex;gap:2px;flex-wrap:wrap}
.hstat{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:20px 28px;min-width:120px;position:relative;overflow:hidden;transition:border-color .2s}
.hstat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.hstat:hover{border-color:rgba(255,45,107,.3)}
.hstat-lbl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;color:var(--muted2);margin-bottom:8px}
.hstat-val{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#fff}
.hstat-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);margin-top:4px}
.main{max-width:1100px;margin:0 auto;padding:0 48px 80px}
.filter-bar{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:28px;padding:20px 24px;background:var(--bg3);border:1px solid var(--border);border-radius:12px}
.filter-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
.filter-lbl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;color:var(--muted2)}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .12s;user-select:none}
.chip.on{background:rgba(255,45,107,.12);border-color:rgba(255,45,107,.45);color:#ff7a9a}
.chip:hover:not(.on){border-color:rgba(255,255,255,.15);color:#aaa}
.filter-sep{width:1px;background:var(--border2);align-self:stretch;margin:0 4px}
.clear-btn{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;background:none;border:1px solid var(--border2);color:var(--muted2);padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s;align-self:flex-end;margin-top:18px}
.clear-btn:hover{color:#ccc;border-color:rgba(255,255,255,.2)}
.search-row{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.search-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;padding:11px 16px;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:rgba(255,45,107,.45)}
.results-info{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;margin-bottom:16px}
#list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.game-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;position:relative}
.game-card:hover{border-color:rgba(255,45,107,.4);transform:translateY(-2px)}
.game-card-top{height:3px;background:linear-gradient(90deg,var(--c,#ff2d6b),transparent)}
.game-card-body{padding:16px 18px}
.game-card-score{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--c,#ff2d6b);margin-bottom:6px;display:flex;align-items:baseline;gap:6px}
.game-card-score big{font-size:28px;filter:drop-shadow(0 0 6px var(--c,#ff2d6b))}
.game-card-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.game-card-meta{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted2);margin-bottom:8px}
.game-card-tags{display:flex;flex-wrap:wrap;gap:4px}
.gtag{font-size:10px;padding:2px 8px;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;border:1px solid}
.cat-bars{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.cat-bar-row{display:flex;align-items:center;gap:6px}
.cat-bar-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2);width:28px;flex-shrink:0}
.cat-bar-track{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px}
.cat-bar-fill{height:100%;border-radius:2px}
.cat-bar-val{font-family:'Share Tech Mono',monospace;font-size:8px;width:20px;text-align:right;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:780px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:10;transition:color .15s}
.modal-close:hover{color:#fff}
.modal-hero{position:relative;padding:40px;overflow:hidden;border-bottom:1px solid var(--border)}
.modal-body{padding:28px 40px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:24px}
.cat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.lbl{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--muted2);margin-bottom:8px}
.empty{text-align:center;padding:80px;color:var(--muted2);font-size:15px}
.loading{text-align:center;padding:100px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:3px}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px currentColor}50%{text-shadow:0 0 50px currentColor,0 0 100px currentColor}}
.score-glow{animation:glowPulse 3s ease-in-out infinite}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">BACKLOG<em>THERAPY</em></div>
  <div class="hdr-meta">
    <span style="display:flex;align-items:center;gap:6px"><span class="hdr-dot"></span>LIVE LOG</span>
    <span id="hdr-count">—</span>
  </div>
</div>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <div>
      <div class="hero-tag">// GAME RATING ARCHIVE</div>
      <div class="hero-title">EVERY GAME.<span>RATED.</span></div>
      <div class="hero-sub">Genre-weighted scoring across 10 categories. Sub-category breakdowns. The full picture.</div>
    </div>
    <div class="hero-stats" id="hero-stats"><div class="loading" style="padding:20px 0">SYNCING...</div></div>
  </div>
</div>
<div class="main">
  <div class="filter-bar" id="filter-bar" style="display:none">
    <div class="filter-group"><div class="filter-lbl">GENRE</div><div class="chips" id="chips-genre"></div></div>
    <div class="filter-sep"></div>
    <div class="filter-group"><div class="filter-lbl">PLATFORM</div><div class="chips" id="chips-platform"></div></div>
    <div class="filter-sep"></div>
    <div class="filter-group"><div class="filter-lbl">PERSPECTIVE</div><div class="chips" id="chips-perspective"></div></div>
    <div class="filter-sep"></div>
    <button class="clear-btn" onclick="clearFilters()">CLEAR ALL</button>
  </div>
  <div class="search-row"><input class="search-inp" id="search" placeholder="Search games..." oninput="render()"/></div>
  <div class="results-info" id="results-info"></div>
  <div id="list"><div class="loading">LOADING LOG...</div></div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>
<script>
const WORKER='https://bt-logger.ahmedhassibi29.workers.dev';
const sc=s=>s>=9?"#00ffb3":s>=7.5?"#a3ff6e":s>=6?"#ffe566":s>=4?"#ff9f43":"#ff4d6d";
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const r2=n=>Math.round(n*100)/100;
const SLBL={10:"Perfect",9:"Excellent",8:"Very Good",7:"Good",6:"Above Avg",5:"Average",4:"Mediocre",3:"Poor",2:"Broken",1:"Unplayable",0:"Useless"};
const slbl=s=>SLBL[Math.round(s)]||"Average";
const CAT_META={gameplay:{label:"Gameplay",icon:"⚔️",color:"#ff6b6b"},graphics:{label:"Graphics",icon:"🎨",color:"#a78bfa"},story:{label:"Story",icon:"📖",color:"#34d399"},sound:{label:"Sound",icon:"🎵",color:"#f59e0b"},performance:{label:"Performance",icon:"⚡",color:"#38bdf8"},replayability:{label:"Replay",icon:"🔄",color:"#fb923c"},innovation:{label:"Innovation",icon:"💡",color:"#e879f9"},multiplayer:{label:"Multiplayer",icon:"👥",color:"#4ade80"},progression:{label:"Progression",icon:"📈",color:"#f472b6"},immersion:{label:"Immersion",icon:"🌍",color:"#67e8f9"}};
let LOG=[];
let F={genres:new Set(),platforms:new Set(),perspectives:new Set()};
async function loadLog(){
  try{const res=await fetch(WORKER+'?t='+Date.now());const data=await res.json();LOG=Array.isArray(data)?data:(data.log||[]);init();}
  catch(e){document.getElementById('list').innerHTML='<div class="empty">Could not load log.</div>';document.getElementById('hero-stats').innerHTML='';}
}
function init(){
  buildStats();buildChips();document.getElementById('filter-bar').style.display='flex';render();
}
function buildStats(){
  const el=document.getElementById('hero-stats');
  if(!LOG.length){el.innerHTML='<div style="color:var(--muted2);font-family:\'Rajdhani\',sans-serif;padding:20px 0">No entries yet.</div>';document.getElementById('hdr-count').textContent='0 GAMES';return;}
  const avgS=r2(LOG.reduce((a,e)=>a+e.finalScore,0)/LOG.length);
  const top=Math.max(...LOG.map(e=>e.finalScore));
  const rec=LOG.filter(e=>e.recommend).length;
  document.getElementById('hdr-count').textContent=LOG.length+' GAMES';
  el.innerHTML=[['RATED',LOG.length,'GAMES'],['AVG SCORE',avgS.toFixed(2),slbl(avgS)],['TOP SCORE',top.toFixed(2),slbl(top)],['RECOMMENDED',rec,Math.round(rec/LOG.length*100)+'%']]
    .map(([l,v,s])=>`<div class="hstat"><div class="hstat-lbl">${l}</div><div class="hstat-val">${v}</div><div class="hstat-sub">${s}</div></div>`).join('');
}
function buildChips(){
  const genres=new Set(),platforms=new Set(),perspectives=new Set();
  LOG.forEach(e=>{(e.genres||[]).forEach(g=>genres.add(g));if(e.platform)platforms.add(e.platform);if(e.perspective)perspectives.add(e.perspective);});
  mkChips('chips-genre',[...genres].sort(),'genres');mkChips('chips-platform',[...platforms].sort(),'platforms');mkChips('chips-perspective',[...perspectives].sort(),'perspectives');
}
function mkChips(id,items,fk){
  const c=document.getElementById(id);c.innerHTML='';
  items.forEach(item=>{const ch=document.createElement('span');ch.className='chip';ch.textContent=item;ch.onclick=()=>{F[fk].has(item)?F[fk].delete(item):F[fk].add(item);ch.classList.toggle('on');render();};c.appendChild(ch);});
}
function clearFilters(){F={genres:new Set(),platforms:new Set(),perspectives:new Set()};document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));document.getElementById('search').value='';render();}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=LOG.filter(e=>{
    if(q&&!e.title.toLowerCase().includes(q))return false;
    if(F.genres.size&&!(e.genres||[]).some(g=>F.genres.has(g)))return false;
    if(F.platforms.size&&!F.platforms.has(e.platform))return false;
    if(F.perspectives.size&&!F.perspectives.has(e.perspective))return false;
    return true;
  });
  const hasF=F.genres.size||F.platforms.size||F.perspectives.size||q;
  document.getElementById('results-info').textContent=hasF?`${filtered.length} of ${LOG.length} games`:`${LOG.length} games`;
  const list=document.getElementById('list');list.innerHTML='';
  if(!filtered.length){list.innerHTML=`<div class="empty">${LOG.length?'No games match filters.':'No games logged yet.'}</div>`;return;}
  filtered.forEach(e=>{
    const clr=sc(e.finalScore);
    const ac=Object.keys(e.subs||{}).filter(c=>c!=='multiplayer'||e.hasMP);
    const card=document.createElement('div');card.className='game-card';card.style.setProperty('--c',clr);
    card.innerHTML=`<div class="game-card-top"></div><div class="game-card-body">
      <div class="game-card-score"><big>${e.finalScore}</big><span style="color:var(--muted2)">${slbl(e.finalScore)}</span></div>
      <div class="game-card-title">${e.title}</div>
      <div class="game-card-meta">${e.platform}${e.date?' · '+e.date:''}${e.playTime?' · '+e.playTime+'h':''}</div>
      <div class="game-card-tags">
        ${(e.genres||[]).map(g=>`<span class="gtag" style="color:rgba(255,107,138,.9);border-color:rgba(255,45,107,.3);background:rgba(255,45,107,.07)">${g}</span>`).join('')}
        ${e.perspective?`<span class="gtag" style="color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.07)">${e.perspective}</span>`:''}
        ${e.recommend!=null?`<span style="font-size:13px;margin-left:2px">${e.recommend?'✅':'❌'}</span>`:''}
      </div>
      ${ac.length?`<div class="cat-bars">${ac.slice(0,6).map(cat=>{
        const subs=(e.subs||{})[cat]||[];const cs=subs.length?r2(avg(subs.map(s=>s.score))):5;const m=CAT_META[cat]||{color:'#ff2d6b',label:cat};
        return`<div class="cat-bar-row"><div class="cat-bar-lbl">${m.label.slice(0,4).toUpperCase()}</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${cs*10}%;background:${m.color};opacity:.7"></div></div><div class="cat-bar-val" style="color:${sc(cs)}">${cs}</div></div>`;
      }).join('')}</div>`:''}
    </div>`;
    card.onclick=()=>openModal(e);list.appendChild(card);
  });
}
function openModal(e){
  const clr=sc(e.finalScore);
  const ac=Object.keys(e.subs||{}).filter(c=>c!=='multiplayer'||e.hasMP);
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-hero">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,${clr},${clr}44,transparent)"></div>
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,${clr}08,transparent 60%);pointer-events:none"></div>
      <div style="position:relative">
        <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:3px;margin-bottom:12px;opacity:.7">${e.platform}${e.date?' // '+e.date:''}${e.playTime?' // '+e.playTime+'HRS':''}</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:clamp(20px,3vw,34px);font-weight:900;color:#fff;margin-bottom:24px;line-height:1.1">${e.title}</div>
        <div style="display:flex;align-items:flex-end;gap:32px;flex-wrap:wrap">
          <div>
            <div class="score-glow" style="font-family:'Orbitron',sans-serif;font-size:80px;font-weight:900;color:${clr};line-height:1">${e.finalScore}</div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:14px;color:${clr};margin-top:6px;font-weight:700;letter-spacing:2px">${slbl(e.finalScore).toUpperCase()}</div>
          </div>
          <div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${(e.genres||[]).map(g=>`<span class="gtag" style="font-size:12px;color:rgba(255,107,138,.9);border-color:rgba(255,45,107,.4);background:rgba(255,45,107,.1);padding:4px 12px">${g}</span>`).join('')}</div>
            ${e.perspective?`<div style="font-family:'Rajdhani',sans-serif;font-size:13px;color:#a78bfa;margin-bottom:8px;font-weight:700">${e.perspective}</div>`:''}
            ${e.recommend!=null?`<div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:${e.recommend?'#4ade80':'#ff4d6d'}">${e.recommend?'✅ Recommended':'❌ Not Recommended'}</div>`:''}
          </div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      ${ac.length?`<div class="lbl">CATEGORY BREAKDOWN</div><div class="cat-grid">${ac.map(cat=>{
        const subs=(e.subs||{})[cat]||[];const cs=subs.length?r2(avg(subs.map(s=>s.score))):5;const w=(e.fw||{})[cat]||0;const m=CAT_META[cat]||{label:cat,icon:'',color:'#ff2d6b'};
        return`<div class="cat-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${m.color},transparent)"></div>
          <div style="font-family:'Orbitron',sans-serif;font-size:8px;color:${m.color};letter-spacing:1px;margin-bottom:8px;padding-top:4px">${m.icon} ${m.label.toUpperCase()}</div>
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">
            <div style="font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:${sc(cs)}">${cs}</div>
            <div style="text-align:right"><div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2)">w:${w}%</div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:${m.color}88">+${(cs*w/100).toFixed(2)}</div></div>
          </div>
          <div style="height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:10px"><div style="height:100%;width:${cs*10}%;background:${m.color};border-radius:2px;opacity:.7"></div></div>
          ${subs.map(s=>`<div style="display:flex;justify-content:space-between;font-family:'Rajdhani',sans-serif;font-size:12px;margin-bottom:3px"><span style="color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${s.name}</span><span style="color:${sc(s.score)};font-weight:700;flex-shrink:0">${s.score}</span></div>`).join('')}
        </div>`;
      }).join('')}</div>`:''}
      ${e.verdict?`<div style="background:var(--bg3);border:1px solid var(--border);border-left:3px solid rgba(255,45,107,.5);border-radius:8px;padding:16px 20px"><div class="lbl">VERDICT</div><div style="font-family:'Rajdhani',sans-serif;font-size:15px;color:#c0c0d8;line-height:1.7">${e.verdict}</div></div>`:''}
    </div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(ev){if(!ev||ev.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}
loadLog();
</script>
</body>
</html>
