<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BT Logger</title>
<link rel="icon" type="image/png" href="icon-512.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04040a;--bg2:#080812;--bg3:#0e0e1c;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8e8f0;--muted:#4a4a6a;
  --accent:#ff2d6b;--accent2:#7c3aed;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);pointer-events:none;z-index:9999}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.65) 100%);pointer-events:none;z-index:9998}
a{color:inherit;text-decoration:none}
input,select,textarea{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;padding:10px 14px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:rgba(255,45,107,.5);box-shadow:0 0 0 3px rgba(255,45,107,.08)}
input:not([type=range]):focus,select:focus,textarea:focus{}
select option{background:#0e0e1c}
input[type=date]{color-scheme:dark}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4);cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a1a30;border-radius:2px}
.page{display:none;animation:fadeUp .35s ease both}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px currentColor}50%{text-shadow:0 0 40px currentColor,0 0 80px currentColor}}
.score-glow{animation:glowPulse 3s ease-in-out infinite}
/* header */
.hdr{position:sticky;top:0;background:rgba(4,4,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:3px;cursor:pointer;user-select:none}
.logo span{color:var(--accent)}
.hdr-right{display:flex;gap:10px;align-items:center}
/* buttons */
.btn{font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:2px;border-radius:6px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:none;text-transform:uppercase}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c2185b);color:#fff;padding:13px 32px;font-size:11px;box-shadow:0 4px 20px rgba(255,45,107,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(255,45,107,.45)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:12px 24px;font-size:10px}
.btn-ghost:hover{border-color:rgba(255,255,255,.25);color:#aaa}
.btn-sm{font-size:9px!important;padding:8px 16px!important;letter-spacing:1px!important}
.btn-danger{border-color:rgba(255,77,109,.3)!important;color:#ff4d6d!important}
.btn-danger:hover{background:rgba(255,77,109,.1)!important}
/* wrap */
.wrap{max-width:720px;margin:0 auto;padding:32px 24px}
/* card */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px 24px}
/* label */
.lbl{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:#3a3a5a;text-transform:uppercase;margin-bottom:8px}
/* divider */
.div{height:1px;background:rgba(255,255,255,.05);margin:20px 0}
/* toggle btn */
.tbtn{background:transparent;border:1px solid var(--border2);border-radius:6px;color:#3a3a5a;padding:9px 22px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.tbtn.on{background:rgba(255,45,107,.15);border-color:rgba(255,45,107,.5);color:#ff6b8a}
/* genre chip */
.chip{border-radius:4px;padding:7px 13px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);display:inline-block;margin:4px}
.chip.on{background:rgba(255,45,107,.15);border-color:rgba(255,45,107,.5);color:#ff6b8a}
.chip:hover:not(.on){border-color:rgba(255,45,107,.35);color:#aaa}
/* step dots */
.steps{display:flex;gap:6px;align-items:center}
.sdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:10px;transition:all .3s;border:1px solid rgba(255,255,255,.06);color:#2a2a4a;background:var(--bg3)}
.sdot.active{background:var(--accent);color:#fff;border:none}
.sdot.done{background:rgba(255,45,107,.15);color:var(--accent);border-color:rgba(255,45,107,.3)}
.sline{width:20px;height:1px;background:rgba(255,255,255,.06)}
.sline.done{background:rgba(255,45,107,.3)}
/* section title */
.stitle{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:#fff;margin-bottom:8px}
.stag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:3px;opacity:.7;margin-bottom:6px}
/* score color util - set via style */
/* sub row */
.sub-row{display:flex;flex-direction:column;gap:8px;padding:12px;border-radius:6px;background:rgba(255,255,255,.025);margin-bottom:8px;border:1px solid transparent;transition:border-color .2s}
.sub-row:hover{border-color:var(--border)}
.sub-name-row{display:flex;align-items:center;gap:8px}
.sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.6}
.sub-del{background:none;border:none;color:#2a2a4a;cursor:pointer;font-size:18px;line-height:1;padding:0 3px;transition:color .15s;flex-shrink:0}
.sub-del:hover{color:#ff4d6d}
.add-sub{background:none;border:1px dashed rgba(255,255,255,.08);border-radius:6px;color:#3a3a5a;cursor:pointer;padding:7px 16px;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:700;width:100%;margin-top:4px;transition:all .15s;letter-spacing:.5px}
/* neon slider */
.ns-wrap{display:flex;align-items:center;gap:14px}
.ns-track{flex:1;height:20px;display:flex;align-items:center;cursor:pointer;user-select:none;-webkit-user-select:none;position:relative}
.ns-bg{position:absolute;inset:0;height:4px;top:50%;transform:translateY(-50%);border-radius:2px;background:rgba(255,255,255,.06)}
.ns-fill{position:absolute;left:0;height:4px;top:50%;transform:translateY(-50%);border-radius:2px;transition:width .06s linear}
.ns-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;pointer-events:none;transition:left .06s linear}
.ns-val{min-width:32px;text-align:right;font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:700}
.ns-lbl{min-width:68px;font-family:'Rajdhani',sans-serif;font-size:12px;color:#3a3a5a;font-weight:600;letter-spacing:.3px}
/* percent slider - native range styled */
.ps-wrap{padding:6px 0}
/* log row */
.log-row{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:border-color .2s,transform .15s;margin-bottom:10px}
.log-row:hover{border-color:rgba(255,45,107,.35);transform:translateX(3px)}
.log-score-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-meta{font-family:'Rajdhani',sans-serif;font-size:13px;color:#3a3a5a}
.log-verdict{font-family:'Rajdhani',sans-serif;font-size:12px;color:#2a2a4a;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.log-actions{display:flex;gap:6px;flex-shrink:0}
/* result hero */
.result-hero{position:relative;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,rgba(255,45,107,.1) 0%,var(--bg3) 60%);border:1px solid rgba(255,45,107,.25);padding:40px 36px;margin-bottom:24px}
.result-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.result-hero::after{content:'';position:absolute;top:0;right:0;width:250px;height:250px;background:radial-gradient(circle at top right,rgba(255,45,107,.12),transparent 70%);pointer-events:none}
/* cat card */
.cat-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative}
.cat-header{padding:16px 20px 14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center}
.cat-bar{height:2px}
.cat-body{padding:16px 20px}
/* computed weight row */
.fw-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.025);border-radius:6px;border-left:2px solid}
/* score bar */
.score-bar-wrap{height:4px;background:rgba(255,255,255,.05);border-radius:2px}
.score-bar-fill{height:100%;border-radius:2px;transition:width .5s}
/* grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g1{display:grid;grid-template-columns:1fr;gap:16px}
/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a0a0e;border:1px solid #ff4d6d;color:#ff4d6d;padding:12px 24px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;z-index:9999;display:none;animation:fadeUp .3s ease}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr" id="hdr">
  <div class="logo" onclick="goHome()">BACKLOG<span>THERAPY</span> <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a2a4a;margin-left:8px">v2.0</span></div>
  <div class="hdr-right" id="hdr-right"></div>
</div>

<!-- PAGES -->
<div id="page-home" class="page active"></div>
<div id="page-log"  class="page"></div>
<div id="page-detail" class="page"></div>
<div id="page-rate" class="page"></div>

<div id="toast"></div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const PLATFORMS=["PC","PS1","PS2","PS3","PS4","PS5","Xbox","Xbox 360","Xbox One","Xbox Series X/S","Nintendo 64","GameCube","Wii","Wii U","Nintendo Switch","Game Boy","GBA","Nintendo DS","Nintendo 3DS","PSP","PS Vita","Dreamcast","Sega Genesis","SNES","NES","Other"];
const GENRES={
  "Action-Adventure":{gameplay:20,graphics:15,story:15,sound:10,performance:10,replayability:5,innovation:5,multiplayer:0,progression:5,immersion:15},
  "RPG":{gameplay:15,graphics:10,story:20,sound:10,performance:5,replayability:10,innovation:5,multiplayer:0,progression:15,immersion:10},
  "JRPG":{gameplay:15,graphics:10,story:20,sound:12,performance:5,replayability:8,innovation:5,multiplayer:0,progression:15,immersion:10},
  "FPS":{gameplay:25,graphics:10,story:10,sound:10,performance:10,replayability:10,innovation:5,multiplayer:10,progression:5,immersion:5},
  "TPS":{gameplay:22,graphics:12,story:12,sound:10,performance:10,replayability:8,innovation:5,multiplayer:8,progression:5,immersion:8},
  "Stealth":{gameplay:20,graphics:10,story:15,sound:10,performance:10,replayability:5,innovation:5,multiplayer:0,progression:5,immersion:20},
  "Survival Horror":{gameplay:15,graphics:15,story:15,sound:15,performance:10,replayability:5,innovation:5,multiplayer:0,progression:5,immersion:15},
  "Horror":{gameplay:12,graphics:15,story:18,sound:18,performance:10,replayability:5,innovation:5,multiplayer:0,progression:2,immersion:15},
  "Fighting":{gameplay:30,graphics:10,story:5,sound:10,performance:10,replayability:5,innovation:5,multiplayer:10,progression:5,immersion:10},
  "Racing":{gameplay:25,graphics:15,story:5,sound:10,performance:15,replayability:10,innovation:5,multiplayer:5,progression:5,immersion:5},
  "Platformer":{gameplay:25,graphics:15,story:10,sound:10,performance:10,replayability:5,innovation:5,multiplayer:0,progression:5,immersion:15},
  "Metroidvania":{gameplay:22,graphics:12,story:12,sound:10,performance:8,replayability:8,innovation:8,multiplayer:0,progression:8,immersion:12},
  "Puzzle":{gameplay:20,graphics:10,story:10,sound:10,performance:10,replayability:15,innovation:10,multiplayer:0,progression:5,immersion:10},
  "Strategy":{gameplay:20,graphics:10,story:10,sound:10,performance:10,replayability:10,innovation:10,multiplayer:5,progression:10,immersion:5},
  "Tactics/TRPG":{gameplay:22,graphics:8,story:15,sound:8,performance:10,replayability:10,innovation:8,multiplayer:5,progression:10,immersion:4},
  "Survival/Crafting":{gameplay:20,graphics:10,story:10,sound:10,performance:10,replayability:10,innovation:5,multiplayer:5,progression:15,immersion:5},
  "Sandbox/Open World":{gameplay:20,graphics:15,story:10,sound:10,performance:10,replayability:5,innovation:5,multiplayer:5,progression:10,immersion:10},
  "Hack & Slash":{gameplay:28,graphics:12,story:8,sound:10,performance:10,replayability:8,innovation:5,multiplayer:5,progression:8,immersion:6},
  "Soulslike":{gameplay:25,graphics:12,story:12,sound:10,performance:10,replayability:8,innovation:8,multiplayer:5,progression:5,immersion:5},
  "Visual Novel":{gameplay:5,graphics:15,story:35,sound:15,performance:5,replayability:10,innovation:5,multiplayer:0,progression:5,immersion:5},
  "Rhythm":{gameplay:25,graphics:10,story:5,sound:30,performance:10,replayability:8,innovation:7,multiplayer:5,progression:0,immersion:0},
  "Sports":{gameplay:25,graphics:12,story:3,sound:8,performance:12,replayability:12,innovation:5,multiplayer:13,progression:5,immersion:5},
  "MMO":{gameplay:15,graphics:10,story:10,sound:10,performance:10,replayability:10,innovation:5,multiplayer:15,progression:10,immersion:5},
  "Battle Royale":{gameplay:22,graphics:10,story:0,sound:8,performance:12,replayability:15,innovation:8,multiplayer:15,progression:5,immersion:5},
  "Point & Click":{gameplay:15,graphics:12,story:28,sound:10,performance:5,replayability:10,innovation:8,multiplayer:0,progression:2,immersion:10},
  "Simulation":{gameplay:20,graphics:12,story:8,sound:8,performance:12,replayability:15,innovation:8,multiplayer:5,progression:7,immersion:5},
  "Walking Sim":{gameplay:5,graphics:20,story:30,sound:20,performance:5,replayability:5,innovation:5,multiplayer:0,progression:5,immersion:5},
};
const MP_GENRES=new Set(["FPS","TPS","Fighting","Racing","Sports","MMO","Battle Royale","Survival/Crafting","Sandbox/Open World","Strategy","Tactics/TRPG","Hack & Slash","Soulslike"]);
const CAT_META={
  gameplay:    {label:"Gameplay Mechanics",icon:"⚔️",color:"#ff6b6b",desc:"Controls, combat, systems & pacing",      subs:["Controls & Movement","Combat Mechanics","Game Systems","Pacing & Feedback"]},
  graphics:    {label:"Graphics / Visuals", icon:"🎨",color:"#a78bfa",desc:"Art direction, technical quality, animation",subs:["Art Direction","Technical Quality","Animation","Camera & Composition"]},
  story:       {label:"Story / Narrative",  icon:"📖",color:"#34d399",desc:"Plot, characters, writing, thematic depth", subs:["Plot & Structure","Characters & Dialogue","Thematic Depth"]},
  sound:       {label:"Sound & Music",      icon:"🎵",color:"#f59e0b",desc:"OST, SFX, voice acting, ambience",          subs:["Score & Themes","Sound Effects","Voice Acting","Ambience"]},
  performance: {label:"Performance",        icon:"⚡",color:"#38bdf8",desc:"Frame rate, bugs, load times",              subs:["Frame Rate & Stability","Load Times","Bug Count","Platform Optimization"]},
  replayability:{label:"Replayability",     icon:"🔄",color:"#fb923c",desc:"Post-game content, NG+, branching paths",   subs:["Post-Game Content","Branching Paths","Player Incentives"]},
  innovation:  {label:"Innovation",         icon:"💡",color:"#e879f9",desc:"Originality, novel mechanics, genre impact", subs:["Originality","Execution of Ideas","Genre Impact"]},
  multiplayer: {label:"Multiplayer",        icon:"👥",color:"#4ade80",desc:"Online/co-op performance, balance, social",  subs:["Server Stability","Balance","Matchmaking","Progression & Rewards"]},
  progression: {label:"Progression System", icon:"📈",color:"#f472b6",desc:"Upgrade trees, pacing, skill-based unlocks",subs:["Structure","Pacing","Balance","Integration with Gameplay"]},
  immersion:   {label:"Immersion",          icon:"🌍",color:"#67e8f9",desc:"World building, consistency, emotional pull",subs:["World Building","Tone Consistency","Emotional Engagement","UI & HUD"]},
};
const CATS=Object.keys(CAT_META);
const SCORE_LABELS={10:"Perfect",9:"Excellent",8:"Very Good",7:"Good",6:"Above Avg",5:"Average",4:"Mediocre",3:"Poor",2:"Broken",1:"Unplayable",0:"Useless"};

// ─── UTILS ────────────────────────────────────────────────────────────────────
function sc(s){if(s>=9)return"#00ffb3";if(s>=7.5)return"#a3ff6e";if(s>=6)return"#ffe566";if(s>=4)return"#ff9f43";return"#ff4d6d";}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function round2(n){return Math.round(n*100)/100;}
function scoreLabel(s){return SCORE_LABELS[Math.round(s)]||"Average";}

// ─── STORAGE (Cloudflare Worker) ──────────────────────────────────────────────
const WORKER='https://bt-logger.ahmedhassibi29.workers.dev';
let LOG=[];
let _synced=false;

async function loadLogFromGH(){
  try{
    const res=await fetch(WORKER+'?t='+Date.now());
    const data=await res.json();
    LOG=Array.isArray(data)?data:(data.log||[]);
    _synced=true;
  }catch(e){LOG=[];_synced=true;}
  renderHome();renderHeader();
}

async function saveLog(l){
  try{
    const res=await fetch(WORKER,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(l)});
    if(!res.ok)throw new Error('HTTP '+res.status);
  }catch(e){toast('Save failed. Check connection.');}
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentView="home";
let session={};
let detailEntry=null;

function resetSession(){
  session={editId:null,step:"info",title:"",platform:"",date:"",playTime:"",perspective:"",hasMP:false,
    genres:[],gw:{},fw:{},subs:{},notes:{},verdict:"",recommend:null};
}
resetSession();

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const p=document.getElementById('page-'+id);
  if(p){p.classList.remove('active');void p.offsetWidth;p.classList.add('active');}
  currentView=id;
  renderHeader();
}
function goHome(){resetSession();renderHome();showPage('home');}
function goLog(){renderLog();showPage('log');}
function goDetail(entry){detailEntry=entry;renderDetail();showPage('detail');}
function goRate(){renderRate();showPage('rate');}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>{t.style.display='none';},3000);
}

// ─── GENRE WEIGHT LOGIC ───────────────────────────────────────────────────────
function reblend(){
  const {genres,gw,hasMP}=session;
  if(!genres.length)return;
  const total=Object.values(gw).reduce((a,b)=>a+b,0);
  if(!total)return;
  const bl={};
  CATS.forEach(cat=>{
    let w=0;genres.forEach(g=>{w+=(GENRES[g][cat]||0)*((gw[g]||0)/total);});bl[cat]=Math.round(w);
  });
  if(!hasMP&&(bl.multiplayer||0)>0){
    const mp=bl.multiplayer;bl.multiplayer=0;
    const ks=CATS.filter(k=>k!=='multiplayer');
    const pk=Math.floor(mp/ks.length);
    ks.forEach(k=>{bl[k]=(bl[k]||0)+pk;});bl[ks[0]]=(bl[ks[0]]||0)+mp-pk*ks.length;
  }
  const sum=Object.values(bl).reduce((a,b)=>a+b,0);
  if(sum!==100)bl[CATS[0]]=(bl[CATS[0]]||0)+(100-sum);
  session.fw=bl;
}
function toggleGenre(g){
  const s=session;
  if(s.genres.includes(g))s.genres=s.genres.filter(x=>x!==g);
  else if(s.genres.length<3)s.genres.push(g);
  else return;
  if(!s.genres.length){s.gw={};s.fw={};return;}
  const even=Math.floor(100/s.genres.length),rem=100-even*s.genres.length;
  s.gw={};s.genres.forEach((genre,i)=>{s.gw[genre]=even+(i===0?rem:0);});
  reblend();
}
function adjWeight(genre,val){
  const s=session,others=s.genres.filter(g=>g!==genre);
  const remaining=100-val,totOth=others.reduce((a,g)=>a+(s.gw[g]||0),0);
  s.gw[genre]=val;
  if(totOth>0)others.forEach(g=>{s.gw[g]=Math.round((s.gw[g]/totOth)*remaining);});
  else{const ev=Math.floor(remaining/others.length);others.forEach((g,i)=>{s.gw[g]=ev+(i===0?remaining-ev*others.length:0);});}
  reblend();
}
function initSubs(){
  if(Object.keys(session.subs).length)return;
  CATS.filter(c=>c!=='multiplayer'||session.hasMP).forEach(cat=>{
    session.subs[cat]=CAT_META[cat].subs.map(n=>({name:n,score:5}));
  });
}
function activeCats(){return CATS.filter(c=>c!=='multiplayer'||session.hasMP);}
function catScore(cat){const s=session.subs[cat]||[];return s.length?round2(avg(s.map(x=>x.score))):5;}
function finalScore(){return round2(activeCats().reduce((acc,c)=>acc+catScore(c)*(session.fw[c]||0)/100,0));}

// ─── NEON SLIDER ─────────────────────────────────────────────────────────────
function makeNeonSlider(val,color,onChange){
  const pct=val*10;
  const wrap=document.createElement('div');wrap.className='ns-wrap';
  const track=document.createElement('div');track.className='ns-track';
  const bg=document.createElement('div');bg.className='ns-bg';
  const fill=document.createElement('div');fill.className='ns-fill';
  fill.style.cssText=`width:${pct}%;background:linear-gradient(90deg,rgba(255,45,107,.5),${color});box-shadow:0 0 8px ${color}66`;
  const thumb=document.createElement('div');thumb.className='ns-thumb';
  thumb.style.cssText=`left:${pct}%;background:radial-gradient(circle at 35% 35%,#fff,${color});box-shadow:0 0 0 2px ${color}44,0 0 12px ${color}88`;
  const valEl=document.createElement('div');valEl.className='ns-val';valEl.style.color=sc(val);valEl.textContent=val;
  const lblEl=document.createElement('div');lblEl.className='ns-lbl';lblEl.textContent=scoreLabel(val);
  track.append(bg,fill,thumb);wrap.append(track,valEl,lblEl);

  let dragging=false;
  const calc=clientX=>{
    const r=track.getBoundingClientRect();
    const raw=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
    return Math.round(raw*10/0.5)*0.5;
  };
  const update=v=>{
    const p=v*10;
    fill.style.width=p+'%';
    thumb.style.left=p+'%';
    valEl.textContent=v;valEl.style.color=sc(v);
    lblEl.textContent=scoreLabel(v);
    onChange(v);
  };
  track.addEventListener('mousedown',e=>{
    e.preventDefault();dragging=true;update(calc(e.clientX));
    const mv=e2=>{if(dragging)update(calc(e2.clientX));};
    const up=()=>{dragging=false;window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  });
  track.addEventListener('touchstart',e=>{
    update(calc(e.touches[0].clientX));
    const mv=e2=>update(calc(e2.touches[0].clientX));
    const up=()=>{window.removeEventListener('touchmove',mv);window.removeEventListener('touchend',up);};
    window.addEventListener('touchmove',mv,{passive:true});window.addEventListener('touchend',up);
  },{passive:true});
  return wrap;
}

function exportLog(){
  const data=JSON.stringify({version:1,exportedAt:new Date().toISOString(),log:LOG},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download=`backlog-therapy-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importLog(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      const entries=p.log||p;
      if(!Array.isArray(entries))throw new Error();
      const existIds=new Set(LOG.map(x=>x.id));
      const newE=entries.filter(x=>!existIds.has(x.id));
      LOG=[...newE,...LOG];saveLog(LOG);
      toast(`Imported ${newE.length} entries`);
      goLog();
    }catch{toast('Invalid file.');}
  };r.readAsText(file);
}

  const dWrap=document.createElement('div');dWrap.innerHTML='<div class="lbl">DATE PLAYED</div>';
  const dInp=document.createElement('input');dInp.type='date';dInp.value=session.date;dInp.oninput=e=>session.date=e.target.value;
  dWrap.appendChild(dInp);grid.appendChild(dWrap);
  // playtime
  const ptWrap=document.createElement('div');ptWrap.innerHTML='<div class="lbl">PLAY TIME (HRS)</div>';
  const ptInp=document.createElement('input');ptInp.type='number';ptInp.min=0;ptInp.value=session.playTime;ptInp.placeholder='e.g. 20';ptInp.oninput=e=>session.playTime=e.target.value;
  ptWrap.appendChild(ptInp);grid.appendChild(ptWrap);
  // perspective
  const perWrap=document.createElement('div');perWrap.innerHTML='<div class="lbl">PERSPECTIVE</div>';
  const perSel=document.createElement('select');perSel.innerHTML='<option value="">Select...</option>'+["First-Person","Third-Person","Top-Down","Side-Scroller","Isometric","2.5D","Mixed"].map(p=>`<option value="${p}"${session.perspective===p?' selected':''}>${p}</option>`).join('');
  perSel.onchange=e=>session.perspective=e.target.value;perWrap.appendChild(perSel);grid.appendChild(perWrap);
  // multiplayer
  const mpWrap=document.createElement('div');mpWrap.style.gridColumn='span 2';mpWrap.innerHTML='<div class="lbl">MULTIPLAYER?</div>';
  const mpRow=document.createElement('div');mpRow.style='display:flex;gap:10px';
  ['Yes','No'].forEach(v=>{
    const b=document.createElement('button');b.className='tbtn'+(session.hasMP===(v==='Yes')?' on':'');
    b.textContent=v;b.onclick=()=>{session.hasMP=v==='Yes';renderStep();};mpRow.appendChild(b);
  });
  mpWrap.appendChild(mpRow);grid.appendChild(mpWrap);
  // next
  document.getElementById('info-next').onclick=()=>{
    if(!session.title||!session.platform)return;
    initSubs();setStep('genre');
  };
}

// GENRE
function renderGenreStep(wrap){
  const s=session;
  wrap.innerHTML=`
  <div class="stag">// STEP 02</div>
  <div class="stitle">GENRE SETUP</div>
  <p style="font-family:'Rajdhani',sans-serif;font-size:15px;color:#3a3a5a;margin-bottom:28px">Pick up to 3 genres. Sliders auto-rebalance to 100%.</p>
  <div id="genre-chips" style="margin-bottom:28px"></div>
  <div id="dominance-section"></div>
  <div id="fw-section"></div>
  <div class="div"></div>
  <div style="display:flex;justify-content:space-between">
    <button class="btn btn-ghost" onclick="setStep('info')">← BACK</button>
    <button class="btn btn-primary" id="genre-next">NEXT →</button>
  </div>`;
  // chips
  const chips=document.getElementById('genre-chips');
  Object.keys(GENRES).forEach(g=>{
    const c=document.createElement('span');c.className='chip'+(s.genres.includes(g)?' on':'');
    c.textContent=g;c.onclick=()=>{toggleGenre(g);renderStep();};chips.appendChild(c);
  });
  // dominance
  if(s.genres.length>1){
    const dom=document.getElementById('dominance-section');
    const card=document.createElement('div');card.className='card';card.style.marginBottom='20px';
    const totalW=Object.values(s.gw).reduce((a,b)=>a+b,0);
    card.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:20px;align-items:center">
      <div class="lbl" style="margin-bottom:0">DOMINANCE SPLIT</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:12px;font-weight:700;color:${totalW===100?'#4ade80':'#ff4d6d'}">${totalW} / 100%</div>
    </div>`;
    function buildDomSliders(){
      while(card.children.length>1)card.removeChild(card.lastChild);
      s.genres.forEach(g=>{
        const gDiv=document.createElement('div');gDiv.style.marginBottom='16px';
        const gh=document.createElement('div');gh.style='display:flex;justify-content:space-between;margin-bottom:6px';
        const gn=document.createElement('span');gn.style='font-family:"Rajdhani",sans-serif;font-size:14px;color:#c0c0d8;font-weight:700';gn.textContent=g;
        const gv=document.createElement('span');gv.dataset.gwFor=g;gv.style='font-family:"Share Tech Mono",monospace;font-size:13px;color:var(--accent);font-weight:700';gv.textContent=(s.gw[g]||0)+'%';
        gh.append(gn,gv);gDiv.appendChild(gh);

        // inline fill-only slider — no DOM rebuild during drag
        const psWrap=document.createElement('div');psWrap.className='ps-wrap';
        const inp=document.createElement('input');
        inp.type='range';inp.min=0;inp.max=100;inp.step=1;inp.value=s.gw[g]||0;
        inp.className='ps-inp';
        setSliderFill(inp,s.gw[g]||0);

        inp.addEventListener('input',e=>{
          const v=parseInt(e.target.value);
          adjWeight(g,v);
          // update fill of THIS slider
          setSliderFill(inp,v);
          // update all other sliders' fills and labels without rebuilding DOM
          s.genres.forEach(og=>{
            if(og===g)return;
            const oInp=card.querySelector('[data-gfor="'+og+'"]');
            const oVal=card.querySelector('[data-gw-for="'+og+'"]');
            if(oInp){oInp.value=s.gw[og]||0;setSliderFill(oInp,s.gw[og]||0);}
            if(oVal)oVal.textContent=(s.gw[og]||0)+'%';
          });
          // update this label too
          const thisVal=card.querySelector('[data-gw-for="'+g+'"]');
          if(thisVal)thisVal.textContent=v+'%';
          // update total
          const tw=Object.values(session.gw).reduce((a,b)=>a+b,0);
          const twEl=card.querySelector('.dom-total');
          if(twEl){twEl.style.color=tw===100?'#4ade80':'#ff4d6d';twEl.textContent=tw+' / 100%';}
          renderFW();
        });

        inp.dataset.gfor=g;
        gv.dataset.gwFor=g;
        psWrap.appendChild(inp);
        gDiv.appendChild(psWrap);card.appendChild(gDiv);
      });
    }
    buildDomSliders();
    const totEl=card.querySelector('div[style*="font-weight:700"]');if(totEl)totEl.classList.add('dom-total');
    dom.appendChild(card);
  }
  renderFW();
  document.getElementById('genre-next').onclick=()=>{if(s.genres.length)setStep('rate');};
}
function renderFW(){
  const fwSec=document.getElementById('fw-section');if(!fwSec)return;
  const s=session;if(!s.genres.length||!Object.keys(s.fw).length){fwSec.innerHTML='';return;}
  const aCats=activeCats();
  fwSec.innerHTML=`<div class="card" style="margin-bottom:20px">
    <div class="lbl">COMPUTED WEIGHTS</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
      ${aCats.map(c=>`<div class="fw-row" style="border-color:${CAT_META[c].color}44">
        <span style="font-family:'Rajdhani',sans-serif;font-size:13px;color:#5a5a7a;font-weight:600">${CAT_META[c].icon} ${CAT_META[c].label}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:12px;color:${CAT_META[c].color};font-weight:700">${s.fw[c]||0}%</span>
      </div>`).join('')}
    </div>
  </div>`;
}

// RATE
function renderRateStep(wrap){
  const s=session;
  wrap.innerHTML=`
  <div class="stag">// STEP 03</div>
  <div class="stitle">RATE IT</div>
  <p style="font-family:'Rajdhani',sans-serif;font-size:15px;color:#3a3a5a;margin-bottom:32px">Sub-category scores average into the main category score.</p>
  <div id="cats-wrap"></div>
  <div class="card" style="margin-bottom:20px;border-left:3px solid rgba(255,45,107,.4)" id="verdict-card"></div>
  <div class="div"></div>
  <div style="display:flex;justify-content:space-between">
    <button class="btn btn-ghost" onclick="setStep('genre')">← BACK</button>
    <button class="btn btn-primary" onclick="setStep('result')">SEE RESULTS →</button>
  </div>`;
  // categories
  const cw=document.getElementById('cats-wrap');
  activeCats().forEach(cat=>cw.appendChild(makeCatCard(cat)));
  // verdict
  const vc=document.getElementById('verdict-card');
  vc.innerHTML='<div class="lbl">PERSONAL VERDICT</div>';
  const vta=document.createElement('textarea');vta.value=s.verdict;vta.placeholder='Final thoughts on this game...';vta.style.minHeight='80px';vta.style.resize='vertical';vta.oninput=e=>s.verdict=e.target.value;
  vc.appendChild(vta);
  const recDiv=document.createElement('div');recDiv.style.marginTop='16px';
  recDiv.innerHTML='<div class="lbl">WOULD YOU RECOMMEND IT?</div>';
  const recRow=document.createElement('div');recRow.style='display:flex;gap:10px';
  [['✅ Yes',true],['❌ No',false]].forEach(([lbl,v])=>{
    const b=document.createElement('button');b.className='tbtn'+(s.recommend===v?' on':'');
    b.textContent=lbl;b.onclick=()=>{s.recommend=v;renderStep();};recRow.appendChild(b);
  });
  recDiv.appendChild(recRow);vc.appendChild(recDiv);
}
function makeCatCard(cat){
  const s=session;const m=CAT_META[cat];
  const subs=s.subs[cat]||[];
  const cs=catScore(cat);
  const card=document.createElement('div');card.style.marginBottom='20px';card.className='cat-card';
  // header
  const hdr=document.createElement('div');hdr.className='cat-header';
  hdr.style.background=`linear-gradient(90deg,${m.color}0a,transparent)`;
  hdr.innerHTML=`
    <div>
      <div style="font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:${m.color};letter-spacing:1.5px">${m.icon} ${m.label.toUpperCase()}</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:12px;color:#2a2a4a;margin-top:2px">${m.desc}</div>
    </div>
    <div style="text-align:right">
      <div id="cs-${cat}" style="font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:${sc(cs)};line-height:1;filter:drop-shadow(0 0 8px ${sc(cs)}66)">${cs}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a2a4a">w:${s.fw[cat]||0}%</div>
    </div>`;
  card.appendChild(hdr);
  // progress bar
  const bar=document.createElement('div');bar.id=`bar-${cat}`;bar.className='cat-bar';
  bar.style.background=`linear-gradient(90deg,${m.color}cc ${cs*10}%,rgba(255,255,255,.04) ${cs*10}%)`;
  card.appendChild(bar);
  // body
  const body=document.createElement('div');body.className='cat-body';
  const subsWrap=document.createElement('div');subsWrap.id=`subs-${cat}`;
  subs.forEach((sub,idx)=>subsWrap.appendChild(makeSubRow(cat,idx,sub,m.color)));
  // add sub btn
  const addBtn=document.createElement('button');addBtn.className='add-sub';addBtn.textContent='+ Add Sub-Category';
  addBtn.onmouseenter=()=>{addBtn.style.borderColor=`${m.color}44`;addBtn.style.color=m.color;};
  addBtn.onmouseleave=()=>{addBtn.style.borderColor='rgba(255,255,255,.08)';addBtn.style.color='#3a3a5a';};
  addBtn.onclick=()=>{
    s.subs[cat].push({name:'New Sub-Category',score:5});
    subsWrap.appendChild(makeSubRow(cat,s.subs[cat].length-1,s.subs[cat][s.subs[cat].length-1],m.color));
  };
  // notes
  const nta=document.createElement('textarea');nta.value=s.notes[cat]||'';
  nta.placeholder=`Notes on ${m.label.toLowerCase()}...`;nta.style.cssText='margin-top:12px;min-height:44px;resize:vertical;font-size:13px;color:#4a4a6a';
  nta.oninput=e=>s.notes[cat]=e.target.value;
  body.append(subsWrap,addBtn,nta);card.appendChild(body);
  return card;
}
function makeSubRow(cat,idx,sub,color){
  const s=session;
  const row=document.createElement('div');row.className='sub-row';
  const nameRow=document.createElement('div');nameRow.className='sub-name-row';
  const dot=document.createElement('div');dot.className='sub-dot';dot.style.background=color;
  const nameInp=document.createElement('input');nameInp.value=sub.name;
  nameInp.style.cssText='flex:1;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.06);border-radius:0;padding:2px 0;font-size:13px;color:#c0c0d8;font-weight:600';
  nameInp.oninput=e=>{s.subs[cat][idx].name=e.target.value;};
  const delBtn=document.createElement('button');delBtn.className='sub-del';delBtn.textContent='×';
  delBtn.onclick=()=>{
    s.subs[cat].splice(idx,1);
    const wrap=document.getElementById(`subs-${cat}`);if(!wrap)return;
    wrap.innerHTML='';s.subs[cat].forEach((sb,i)=>wrap.appendChild(makeSubRow(cat,i,sb,color)));
    updateCatScore(cat);
  };
  nameRow.append(dot,nameInp,delBtn);row.appendChild(nameRow);
  const slider=makeNeonSlider(sub.score,color,v=>{s.subs[cat][idx].score=v;updateCatScore(cat);});
  row.appendChild(slider);return row;
}
function updateCatScore(cat){
  const cs=catScore(cat);const m=CAT_META[cat];
  const csEl=document.getElementById(`cs-${cat}`);
  const barEl=document.getElementById(`bar-${cat}`);
  if(csEl){csEl.textContent=cs;csEl.style.color=sc(cs);csEl.style.filter=`drop-shadow(0 0 8px ${sc(cs)}66)`;}
  if(barEl)barEl.style.background=`linear-gradient(90deg,${m.color}cc ${cs*10}%,rgba(255,255,255,.04) ${cs*10}%)`;
}

// RESULT
function renderResultStep(wrap){
  const s=session;const fs=finalScore();const aCats=activeCats();
  wrap.innerHTML=`
  <div class="stag">// STEP 04</div>
  <div class="stitle">FINAL RESULT</div>
  <div class="result-hero">
    <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:3px;margin-bottom:12px;opacity:.7">${s.platform}${s.date?' // '+s.date:''}${s.playTime?' // '+s.playTime+'HRS':''}</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:clamp(20px,3.5vw,36px);font-weight:900;color:#fff;margin-bottom:24px;line-height:1.1">${s.title}</div>
    <div style="display:flex;align-items:flex-end;gap:28px;flex-wrap:wrap">
      <div>
        <div class="score-glow" style="font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;color:${sc(fs)};line-height:1;text-shadow:0 0 40px ${sc(fs)}66">${fs.toFixed(2)}</div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:15px;color:${sc(fs)};margin-top:6px;font-weight:700;letter-spacing:1px">${scoreLabel(fs)}</div>
      </div>
      <div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${s.genres.map(g=>`<span style="font-size:10px;background:rgba(255,45,107,.12);color:rgba(255,107,138,.9);padding:3px 10px;border-radius:4px;border:1px solid rgba(255,45,107,.4);font-family:'Rajdhani',sans-serif;font-weight:700">${g}</span>`).join('')}</div>
        ${s.recommend!=null?`<div style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:${s.recommend?'#4ade80':'#ff4d6d'}">${s.recommend?'✅ Recommended':'❌ Not Recommended'}</div>`:''}
      </div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px">
    ${aCats.map(cat=>{
      const cs=catScore(cat),w=s.fw[cat]||0,m=CAT_META[cat];
      return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${m.color},transparent)"></div>
        <div style="font-family:'Orbitron',sans-serif;font-size:8px;color:${m.color};letter-spacing:1px;margin-bottom:8px">${m.icon} ${m.label.toUpperCase()}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end">
          <div style="font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:${sc(cs)}">${cs}</div>
          <div style="text-align:right">
            <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a2a4a">w:${w}%</div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:${m.color}88">+${(cs*w/100).toFixed(2)}</div>
          </div>
        </div>
        <div style="height:2px;background:rgba(255,255,255,.04);border-radius:1px;margin-top:10px">
          <div style="height:100%;width:${cs*10}%;background:${m.color};border-radius:1px;opacity:.7"></div>
        </div>
      </div>`;
    }).join('')}
  </div>
  ${s.verdict?`<div class="card" style="margin-bottom:20px;border-left:3px solid rgba(255,45,107,.4)">
    <div class="lbl">VERDICT</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:16px;color:#c0c0d8;line-height:1.6">${s.verdict}</div>
  </div>`:''}
  <div class="div"></div>
  <div style="display:flex;justify-content:space-between">
    <button class="btn btn-ghost" onclick="setStep('rate')">← EDIT SCORES</button>
    <button class="btn btn-primary" id="save-btn">💾 SAVE TO LOG</button>
  </div>`;
  document.getElementById('save-btn').onclick=saveEntry;
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
function saveEntry(){
  const s=session;const fs=finalScore();
  const entry={
    id:s.editId||Date.now(),
    savedAt:new Date().toISOString(),
    title:s.title,platform:s.platform,date:s.date,playTime:s.playTime,
    perspective:s.perspective,hasMP:s.hasMP,genres:[...s.genres],
    gw:{...s.gw},fw:{...s.fw},
    subs:JSON.parse(JSON.stringify(s.subs)),
    notes:{...s.notes},verdict:s.verdict,recommend:s.recommend,
    finalScore:parseFloat(fs.toFixed(2))
  };
  if(s.editId){LOG=LOG.map(e=>e.id===s.editId?entry:e);}
  else{LOG.unshift(entry);}
  saveLog(LOG);resetSession();goLog();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderHome();renderHeader();loadLogFromGH();
</script>
