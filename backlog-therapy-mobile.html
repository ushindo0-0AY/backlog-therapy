<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#04040a"/>
<title>Backlog Therapy</title>
<link rel="icon" type="image/png" href="icon-512.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#04040a;--bg2:#080812;--bg3:#0e0e1c;--bg4:#13131f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e8f0;--muted:#4a4a6a;
  --accent:#ff2d6b;--accent2:#7c3aed;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Rajdhani',sans-serif;color:var(--text);display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none;z-index:9999}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#topbar{flex-shrink:0;height:52px;background:rgba(4,4,10,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(68px + var(--safe-bot))}
#navbar{position:fixed;bottom:0;left:0;right:0;background:rgba(4,4,10,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;padding-bottom:var(--safe-bot)}
#nav-tabs{display:flex;height:56px;align-items:stretch}
#nav-lang{display:flex;align-items:center;justify-content:center;padding:0 10px;border-left:1px solid rgba(255,255,255,.05)}
#lang-btn{background:none;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:4px;padding:4px 6px;white-space:nowrap}
#lang-btn:active{opacity:.6}
.tb-logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:2px;color:#fff}
.tb-logo span{color:var(--accent)}
.tb-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:#fff}
.tb-back{background:none;border:none;color:var(--muted);font-size:24px;line-height:1;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;transition:color .15s;padding-top:6px}
.nav-btn .nav-icon{font-size:22px;line-height:1}
.nav-btn .nav-lbl{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1.5px;font-weight:700}
.nav-btn.active .nav-lbl{color:var(--accent)}
.nav-btn:not(.active) .nav-lbl{color:var(--muted)}
.page{display:none}
.page.active{display:block;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 16px currentColor}50%{text-shadow:0 0 32px currentColor,0 0 60px currentColor}}
.score-glow{animation:glowPulse 3s ease-in-out infinite}
input,select,textarea{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;padding:12px 14px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:rgba(255,45,107,.6)}
select option{background:#0e0e1c}
input[type=date]{color-scheme:dark}
textarea{resize:none;min-height:72px}
::-webkit-scrollbar{display:none}
.pad{padding:16px}
.lbl{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:#3a3a5a;text-transform:uppercase;margin-bottom:8px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.div{height:1px;background:var(--border);margin:16px 0}
.stag{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:3px;opacity:.7;margin-bottom:4px}
.stitle{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:#fff;margin-bottom:6px}
.btn{font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:1.5px;border-radius:8px;cursor:pointer;border:none;text-transform:uppercase;transition:transform .1s,opacity .1s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96);opacity:.85}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c2185b);color:#fff;padding:15px;font-size:14px;width:100%;display:block;box-shadow:0 4px 16px rgba(255,45,107,.3)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:13px;font-size:13px;width:100%;display:block}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.tbtn{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--muted);padding:12px 20px;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;cursor:pointer;flex:1;transition:all .15s}
.tbtn.on{background:rgba(255,45,107,.15);border-color:rgba(255,45,107,.5);color:#ff6b8a}
.chip{border-radius:6px;padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--muted);display:inline-block;margin:3px;transition:all .12s}
.chip.on{background:rgba(255,45,107,.15);border-color:rgba(255,45,107,.5);color:#ff6b8a}
.chip:active{transform:scale(.94)}
.steps{display:flex;gap:6px;align-items:center}
.sdot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:11px;border:1px solid var(--border);color:#2a2a4a;background:var(--bg3)}
.sdot.active{background:var(--accent);color:#fff;border:none}
.sdot.done{background:rgba(255,45,107,.15);color:var(--accent);border-color:rgba(255,45,107,.3)}
.sline{width:16px;height:1px;background:var(--border)}
.sline.done{background:rgba(255,45,107,.3)}
.home-hero{padding:28px 16px 20px;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,45,107,.1),transparent 70%);pointer-events:none}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:#fff;margin-top:4px}
.recent-section{padding:0 16px 16px}
.recent-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s}
.recent-card:active{border-color:rgba(255,45,107,.4)}
.log-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;margin-bottom:8px;transition:border-color .2s}
.log-row:active{border-color:rgba(255,45,107,.4)}
.log-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-meta{font-family:'Rajdhani',sans-serif;font-size:15px;color:var(--muted)}
.detail-hero{padding:20px 16px;position:relative;overflow:hidden}
.detail-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
/* ── EXPANDABLE CAT MINI ───────────────────────────────────────────────────── */
.cat-mini{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s;-webkit-user-select:none;user-select:none}
.cat-mini:active{border-color:rgba(255,255,255,.18);transform:scale(.98)}
.form-field{margin-bottom:14px}
.sub-row{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.sub-name-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sub-del{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
.add-sub-btn{background:none;border:1px dashed rgba(255,255,255,.1);border-radius:8px;color:var(--muted);cursor:pointer;padding:10px;font-size:16px;font-family:'Rajdhani',sans-serif;font-weight:700;width:100%;margin-top:4px;letter-spacing:.5px}
.ns-wrap{display:flex;align-items:center;gap:12px}
.ns-track{flex:1;height:28px;display:flex;align-items:center;cursor:pointer;user-select:none;-webkit-user-select:none;position:relative;touch-action:none}
.ns-bg{position:absolute;inset:0;height:5px;top:50%;transform:translateY(-50%);border-radius:3px;background:rgba(255,255,255,.07)}
.ns-fill{position:absolute;left:0;height:5px;top:50%;transform:translateY(-50%);border-radius:3px}
.ns-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;pointer-events:none}
.ns-val{min-width:30px;text-align:right;font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:700}
.ns-lbl{min-width:58px;font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--muted);font-weight:600}
.ps-inp{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;outline:none;border:none;padding:0;display:block;cursor:pointer;touch-action:none}
.ps-inp::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #ff2d6b;box-shadow:0 0 8px rgba(255,45,107,.6);margin-top:-8px;cursor:pointer}
.ps-inp::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #ff2d6b;box-shadow:0 0 8px rgba(255,45,107,.6);cursor:pointer}
#toast{position:fixed;bottom:calc(68px + var(--safe-bot));left:16px;right:16px;background:#1a0a0e;border:1px solid #ff4d6d;color:#ff4d6d;padding:12px 16px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;z-index:9998;display:none;animation:fadeUp .25s ease;text-align:center}
.result-hero{position:relative;border-radius:14px;background:linear-gradient(135deg,rgba(255,45,107,.1),var(--bg3));border:1px solid rgba(255,45,107,.25);padding:24px 20px;margin-bottom:16px;overflow:hidden}
.result-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.search-wrap{padding:12px 16px;position:sticky;top:0;background:var(--bg);z-index:10}
.mine-io{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.io-btn{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:12px 8px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.io-btn:active{transform:scale(.95);background:rgba(255,45,107,.08);border-color:rgba(255,45,107,.4);color:#ff6b8a}
.lang-sheet{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:500;display:none;align-items:flex-end}
.lang-sheet.open{display:flex;animation:lsIn .2s ease}
@keyframes lsIn{from{opacity:0}to{opacity:1}}
.lang-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;padding:20px 16px calc(16px + var(--safe-bot))}
.lang-panel-title{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:#3a3a5a;margin-bottom:14px}
.lang-opt{padding:13px 16px;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--muted);cursor:pointer;border-radius:8px;transition:all .12s}
.lang-opt:active{background:rgba(255,255,255,.04)}
.lang-opt.sel{color:var(--accent);background:rgba(255,45,107,.07)}

.score-fold-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1.5px;padding:9px 14px;border-radius:7px;cursor:pointer;margin:8px 0 4px;transition:all .15s}
.score-fold-btn.has-active{border-color:rgba(255,45,107,.45);color:#ff7a9a}
.score-fold-body{display:none;flex-direction:column;gap:3px;margin-bottom:4px}
.score-fold-body.open{display:flex}
.ss-row{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:4px 8px}
.ss-lbl{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);width:66px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-inp{flex:1;min-width:0;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.08);outline:none;cursor:pointer}
.ss-inp::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 5px rgba(255,45,107,.6)}
.ss-val{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);width:20px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="tb-left"></div>
    <div id="tb-center"></div>
    <div id="tb-right"></div>
  </div>
  <div id="content">
    <div id="page-home"       class="page active"></div>
    <div id="page-log"        class="page"></div>
    <div id="page-mine"       class="page"></div>
    <div id="page-detail"     class="page"></div>
    <div id="page-minedetail" class="page"></div>
    <div id="page-rate"       class="page"></div>
  </div>
  <div id="navbar">
    <div id="nav-tabs">
      <button class="nav-btn active" id="nav-home" onclick="goHome()">
        <span class="nav-icon">🏠</span><span class="nav-lbl" id="nl-home">HOME</span>
      </button>
      <button class="nav-btn" id="nav-log" onclick="goLog()">
        <span class="nav-icon">📋</span><span class="nav-lbl" id="nl-log">LOG</span>
      </button>
      <button class="nav-btn" id="nav-mine" onclick="goMine()">
        <span class="nav-icon">⭐</span><span class="nav-lbl" id="nl-mine">MINE</span>
      </button>
      <div id="nav-lang">
        <button id="lang-btn" onclick="openLang()">🌐 <span id="lang-lbl">EN</span></button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<div class="lang-sheet" id="lang-sheet" onclick="if(event.target===this)closeLang()">
  <div class="lang-panel">
    <div class="lang-panel-title">LANGUAGE / اللغة</div>
    <div id="lang-opts"></div>
  </div>
</div>
<input type="file" id="imp-file" accept=".json" style="display:none" onchange="handleImport(this)"/>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────

function reblend(){
  const {genres,gw,hasMP}=sess;if(!genres.length)return;
  const total=Object.values(gw).reduce((a,b)=>a+b,0);if(!total)return;
  const bl={};CATS.forEach(cat=>{let w=0;genres.forEach(g=>{w+=(GENRES[g][cat]||0)*((gw[g]||0)/total);});bl[cat]=Math.round(w);});
  if(!hasMP&&(bl.multiplayer||0)>0){const mp=bl.multiplayer;bl.multiplayer=0;const ks=CATS.filter(k=>k!=='multiplayer');const pk=Math.floor(mp/ks.length);ks.forEach(k=>{bl[k]=(bl[k]||0)+pk;});bl[ks[0]]=(bl[ks[0]]||0)+mp-pk*ks.length;}
  const sum=Object.values(bl).reduce((a,b)=>a+b,0);if(sum!==100)bl[CATS[0]]=(bl[CATS[0]]||0)+(100-sum);
  sess.fw=bl;
}
function toggleGenre(g){
  if(sess.genres.includes(g))sess.genres=sess.genres.filter(x=>x!==g);
  else if(sess.genres.length<3)sess.genres.push(g);
  else return;
  if(!sess.genres.length){sess.gw={};sess.fw={};return;}
  const ev=Math.floor(100/sess.genres.length),rm=100-ev*sess.genres.length;
  sess.gw={};sess.genres.forEach((g2,i)=>{sess.gw[g2]=ev+(i===0?rm:0);});reblend();
}
function adjWeight(g,val){
  const others=sess.genres.filter(x=>x!==g);const rem=100-val,tot=others.reduce((a,x)=>a+(sess.gw[x]||0),0);
  sess.gw[g]=val;
  if(tot>0)others.forEach(x=>{sess.gw[x]=Math.round((sess.gw[x]/tot)*rem);});
  else{const ev=Math.floor(rem/others.length);others.forEach((x,i)=>{sess.gw[x]=ev+(i===0?rem-ev*others.length:0);});}
  reblend();
}
function initSubs(){if(Object.keys(sess.subs).length)return;CATS.filter(c=>c!=='multiplayer'||sess.hasMP).forEach(cat=>{sess.subs[cat]=CAT_META[cat].subs.map(n=>({name:n,score:5}));});}
const aCats=()=>CATS.filter(c=>c!=='multiplayer'||sess.hasMP);
const catScore=cat=>{const s=sess.subs[cat]||[];return s.length?r2(avg(s.map(x=>x.score))):5;};
const finalScore=()=>r2(aCats().reduce((acc,c)=>acc+catScore(c)*(sess.fw[c]||0)/100,0));

function neonSlider(val,color,onChange){
  const pct=val*10;const wrap=document.createElement('div');wrap.className='ns-wrap';
  const track=document.createElement('div');track.className='ns-track';
  const bg=document.createElement('div');bg.className='ns-bg';

  const lblEl=document.createElement('div');lblEl.className='ns-lbl';lblEl.textContent=slbl(val);
  track.append(bg,fill,thumb);wrap.append(track,valEl,lblEl);
  const calc=cx=>{const r=track.getBoundingClientRect();return Math.round(Math.max(0,Math.min(1,(cx-r.left)/r.width))*10/0.5)*0.5;};
  const upd=v=>{const p=v*10;fill.style.width=p+'%';thumb.style.left=p+'%';valEl.textContent=v;valEl.style.color=sc(v);lblEl.textContent=slbl(v);onChange(v);};
  track.addEventListener('mousedown',e=>{e.preventDefault();upd(calc(e.clientX));const mv=e2=>upd(calc(e2.clientX));const up=()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up);};addEventListener('mousemove',mv);addEventListener('mouseup',up);});
  track.addEventListener('touchstart',e=>{upd(calc(e.touches[0].clientX));const mv=e2=>upd(calc(e2.touches[0].clientX));const up=()=>{removeEventListener('touchmove',mv);removeEventListener('touchend',up);};addEventListener('touchmove',mv,{passive:true});addEventListener('touchend',up);},{passive:true});
  return wrap;
}
function setFill(i,v){i.style.background=`linear-gradient(90deg,#ff2d6b ${v}%,rgba(255,255,255,.07) ${v}%)`;}
function pctSlider(val,onChange){

function doExport(){
  if(!MINE.length)return toast('Nothing to export.');
  const data=JSON.stringify({version:1,exportedAt:new Date().toISOString(),log:MINE},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download='my-backlog-ratings-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),100);
}
function doImport(){document.getElementById('imp-file').click();}
function handleImport(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      const entries=Array.isArray(parsed)?parsed:(parsed.log||[]);
      if(!Array.isArray(entries))throw 0;
      const ids=new Set(MINE.map(x=>x.id));
      const fresh=entries.filter(x=>!ids.has(x.id));
      MINE=[...fresh,...MINE];saveMine();
      toast('Imported '+fresh.length+' entr'+(fresh.length===1?'y':'ies'));
      goMine();
    }catch{toast('Invalid JSON file.');}
  };
  reader.readAsText(file);inp.value='';
}

function renderRate(){document.getElementById('page-rate').innerHTML='<div class="pad" id="rate-body"></div>';renderStep();}
function renderStep(){
  const body=document.getElementById('rate-body');if(!body)return;body.innerHTML='';
  const steps=['info','genre','rate','result'];const si=steps.indexOf(sess.step);
  const stepsEl=document.createElement('div');stepsEl.className='steps';
  steps.forEach((s,i)=>{const d=document.createElement('div');d.className='sdot';if(i<si)d.classList.add('done');else if(i===si)d.classList.add('active');d.textContent=i+1;stepsEl.appendChild(d);if(i<3){const l=document.createElement('div');l.className='sline';if(i<si)l.classList.add('done');stepsEl.appendChild(l);}});
  document.getElementById('tb-center').innerHTML='';document.getElementById('tb-center').appendChild(stepsEl);
  if(sess.step==='info')   renderInfo(body);

}

function makeCatCard(cat){

function makeSubRow(cat,idx,sub,color){

  body.appendChild(hero);
  const grid=document.createElement('div');grid.style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px';
  ac.forEach(cat=>{const cs=catScore(cat),w=sess.fw[cat]||0,m=CAT_META[cat];const c=document.createElement('div');c.style=`background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;overflow:hidden`;c.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${m.color},transparent)"></div><div style="font-family:'Orbitron',sans-serif;font-size:9px;color:${m.color};letter-spacing:1px;margin-bottom:6px;padding-top:4px">${m.icon} ${m.label.toUpperCase()}</div><div style="display:flex;justify-content:space-between;align-items:flex-end"><div style="font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:${sc(cs)}">${cs}</div><div style="text-align:right"><div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)">w:${w}%</div><div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:${m.color}88">+${(cs*w/100).toFixed(2)}</div></div></div><div style="height:2px;background:rgba(255,255,255,.05);border-radius:1px;margin-top:8px"><div style="height:100%;width:${cs*10}%;background:${m.color};border-radius:1px;opacity:.7"></div></div>`;grid.appendChild(c);});
  body.appendChild(grid);
  if(sess.verdict){const vd=document.createElement('div');vd.className='card';vd.style.marginBottom='16px';vd.innerHTML=`<div class="lbl">${tl.verdict}</div><div style="font-family:'Rajdhani',sans-serif;font-size:17px;color:#c0c0d8;line-height:1.5">${sess.verdict}</div>`;body.appendChild(vd);}
  const div=document.createElement('div');div.className='div';body.appendChild(div);
  const br=document.createElement('div');br.className='btn-row';
  const bk=document.createElement('button');bk.className='btn btn-ghost';bk.textContent='← EDIT';bk.onclick=()=>setStep('rate');
  const sv=document.createElement('button');sv.className='btn btn-primary';sv.textContent=tl.sv;sv.onclick=saveEntry;
  br.append(bk,sv);body.appendChild(br);
}

function saveEntry(){
  const fs=finalScore();
  const entry={id:sess.editId||Date.now(),savedAt:new Date().toISOString(),title:sess.title,platform:sess.platform,date:sess.date,playTime:sess.playTime,perspective:sess.perspective,hasMP:sess.hasMP,genres:[...sess.genres],gw:{...sess.gw},fw:{...sess.fw},subs:JSON.parse(JSON.stringify(sess.subs)),notes:{...sess.notes},verdict:sess.verdict,recommend:sess.recommend,finalScore:parseFloat(fs.toFixed(2))};
  if(sess.editId)MINE=MINE.map(e=>e.id===sess.editId?entry:e);else MINE.unshift(entry);
  saveMine();resetSess();toast('Saved!');goMine();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fld(parent,label,inputEl){const w=document.createElement('div');w.className='form-field';w.innerHTML=`<div class="lbl">${label}</div>`;w.appendChild(inputEl);parent.appendChild(w);}
function mkInp(type,val,ph,onChange,large=false){const i=document.createElement('input');i.type=type;i.value=val;i.placeholder=ph;if(large)i.style='font-size:20px;font-weight:700;padding:14px';i.addEventListener('input',e=>onChange(e.target.value));return i;}

// ─── INIT ─────────────────────────────────────────────────────────────────────
const _sl=localStorage.getItem('bt_lang');if(_sl&&TT[_sl]){lang=_sl;document.getElementById('lang-lbl').textContent=_sl.toUpperCase();}
updateCatMeta();
loadMine();
loadLog();
console.log('Backlog Therapy v4 loaded ✓');
</script>
