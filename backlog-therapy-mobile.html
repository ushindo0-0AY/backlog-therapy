<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#04040a"/>
<title>Backlog Therapy v3</title>
<link rel="icon" type="image/png" href="icon-512.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans+Arabic:wght@500;700&family=Noto+Sans+JP:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#04040a;--bg2:#080812;--bg3:#0e0e1c;--bg4:#13131f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e8f0;--muted:#4a4a6a;
  --accent:#ff2d6b;--accent2:#7c3aed;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Rajdhani',sans-serif;color:var(--text);display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none;z-index:9999}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#topbar{flex-shrink:0;height:52px;background:rgba(4,4,10,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(64px + var(--safe-bot))}
#navbar{position:fixed;bottom:0;left:0;right:0;height:calc(56px + var(--safe-bot));padding-bottom:var(--safe-bot);background:rgba(4,4,10,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100}
.tb-logo{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:2px;color:#fff}
.tb-logo span{color:var(--accent)}
.tb-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:#fff}
.tb-action{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;background:linear-gradient(135deg,var(--accent),#c2185b);color:#fff;border:none;border-radius:6px;padding:8px 14px;cursor:pointer}
.tb-back{background:none;border:none;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;transition:color .15s;padding-top:6px}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn .nav-lbl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:1.5px;font-weight:700}
.nav-btn.active .nav-lbl{color:var(--accent)}
.nav-btn:not(.active) .nav-lbl{color:var(--muted)}
.page{display:none}
.page.active{display:block;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 16px currentColor}50%{text-shadow:0 0 32px currentColor,0 0 60px currentColor}}
.score-glow{animation:glowPulse 3s ease-in-out infinite}
input,select,textarea{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;padding:12px 14px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:rgba(255,45,107,.6)}
select option{background:#0e0e1c}
input[type=date]{color-scheme:dark}
textarea{resize:none;min-height:72px}
::-webkit-scrollbar{display:none}
.pad{padding:16px}
.lbl{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;color:#3a3a5a;text-transform:uppercase;margin-bottom:8px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.div{height:1px;background:var(--border);margin:16px 0}
.stag{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:3px;opacity:.7;margin-bottom:4px}
.stitle{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:6px}
.btn{font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:1.5px;border-radius:8px;cursor:pointer;border:none;text-transform:uppercase;transition:transform .1s,opacity .1s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96);opacity:.85}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c2185b);color:#fff;padding:15px;font-size:11px;width:100%;display:block;box-shadow:0 4px 16px rgba(255,45,107,.3)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:13px;font-size:10px;width:100%;display:block}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.tbtn{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--muted);padding:12px 20px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;cursor:pointer;flex:1;transition:all .15s}
.tbtn.on{background:rgba(255,45,107,.15);border-color:rgba(255,45,107,.5);color:#ff6b8a}
.chip{border-radius:6px;padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--muted);display:inline-block;margin:3px;transition:all .12s}
.chip.on{background:rgba(255,45,107,.15);border-color:rgba(255,45,107,.5);color:#ff6b8a}
.chip:active{transform:scale(.94)}
.steps{display:flex;gap:6px;align-items:center}
.sdot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:9px;border:1px solid var(--border);color:#2a2a4a;background:var(--bg3)}
.sdot.active{background:var(--accent);color:#fff;border:none}
.sdot.done{background:rgba(255,45,107,.15);color:var(--accent);border-color:rgba(255,45,107,.3)}
.sline{width:16px;height:1px;background:var(--border)}
.sline.done{background:rgba(255,45,107,.3)}
.form-field{margin-bottom:14px}
.sub-row{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.sub-name-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sub-del{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
.add-sub-btn{background:none;border:1px dashed rgba(255,255,255,.1);border-radius:8px;color:var(--muted);cursor:pointer;padding:10px;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:700;width:100%;margin-top:4px;letter-spacing:.5px}
.ns-wrap{display:flex;align-items:center;gap:12px}
.ns-track{flex:1;height:28px;display:flex;align-items:center;cursor:pointer;user-select:none;-webkit-user-select:none;position:relative;touch-action:none}
.ns-bg{position:absolute;inset:0;height:5px;top:50%;transform:translateY(-50%);border-radius:3px;background:rgba(255,255,255,.07)}
.ns-fill{position:absolute;left:0;height:5px;top:50%;transform:translateY(-50%);border-radius:3px}
.ns-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;pointer-events:none}
.ns-val{min-width:30px;text-align:right;font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700}
.ns-lbl{min-width:58px;font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--muted);font-weight:600}
.ps-inp{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;outline:none;border:none;padding:0;display:block;cursor:pointer;touch-action:none}
.ps-inp::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #ff2d6b;box-shadow:0 0 8px rgba(255,45,107,.6);margin-top:-8px;cursor:pointer}
.ps-inp::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #ff2d6b;box-shadow:0 0 8px rgba(255,45,107,.6);cursor:pointer}
.result-hero{position:relative;border-radius:14px;background:linear-gradient(135deg,rgba(255,45,107,.1),var(--bg3));border:1px solid rgba(255,45,107,.25);padding:24px 20px;margin-bottom:16px;overflow:hidden}
.result-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.log-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;margin-bottom:8px;transition:border-color .2s}
.log-row:active{border-color:rgba(255,45,107,.4)}
.log-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}
.log-score{min-width:44px;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;text-align:center}
.log-info{flex:1;min-width:0}
.log-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-meta{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted)}
.gtag{font-size:10px;padding:2px 7px;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;border:1px solid}
.filter-toggle-btn{display:flex;align-items:center;gap:6px;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:7px 12px;border-radius:6px;cursor:pointer;margin:12px 16px 0;transition:all .15s}
.filter-toggle-btn.has-active{border-color:rgba(255,45,107,.45);color:#ff7a9a}
.filter-section{padding:0 16px 12px;display:none}
.filter-section.open{display:block}
.fchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.fchip{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;padding:5px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .1s}
.fchip.on{background:rgba(255,45,107,.12);border-color:rgba(255,45,107,.45);color:#ff7a9a}
.search-wrap{padding:0 16px 10px;position:sticky;top:0;background:var(--bg);z-index:10;padding-top:10px}
.sslider-row{display:flex;align-items:center;gap:8px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:7px 10px;margin-bottom:6px}
.sslider-lbl{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--muted);min-width:90px;flex-shrink:0}
.sslider-inp{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.08);outline:none;cursor:pointer}
.sslider-inp::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.sslider-val{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);width:20px;text-align:right;flex-shrink:0}
.mine-actions{display:flex;gap:8px;padding:10px 16px 4px}
.mine-action-btn{flex:1;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;padding:9px 4px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;text-align:center}
.mine-action-btn.primary{background:linear-gradient(135deg,var(--accent),#c2185b);border:none;color:#fff}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end}
.sheet-overlay.open{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:var(--safe-bot);position:relative}
.sheet-handle{width:36px;height:4px;background:var(--muted);border-radius:2px;margin:12px auto 0}
.sheet-close{position:absolute;top:14px;right:16px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.cat-mini{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.lang-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;padding:5px 9px;cursor:pointer}
.lang-sheet{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:300;display:none;align-items:flex-end}
.lang-sheet.open{display:flex}
.lang-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;padding:20px 16px calc(20px + var(--safe-bot))}
.lang-opt{padding:13px 16px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;border-radius:8px}
.lang-opt.active{color:var(--accent)}
#toast{position:fixed;bottom:calc(72px + var(--safe-bot));left:16px;right:16px;background:#1a0a0e;border:1px solid #ff4d6d;color:#ff4d6d;padding:12px 16px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;z-index:9998;display:none;animation:fadeUp .25s ease;text-align:center}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="tb-left"><div class="tb-logo">B<span>T</span></div></div>
    <div id="tb-center"></div>
    <div id="tb-right"><button class="lang-btn" onclick="openLangSheet()">🌐 <span id="lang-label">EN</span></button></div>
  </div>
  <div id="content">
    <div id="page-home"   class="page active"></div>
    <div id="page-log"    class="page"></div>
    <div id="page-mine"   class="page"></div>
    <div id="page-rate"   class="page"></div>
  </div>
  <div id="navbar">
    <button class="nav-btn active" id="nav-home" onclick="goHome()"><span class="nav-icon">🏠</span><span class="nav-lbl" id="nl-home">HOME</span></button>
    <button class="nav-btn" id="nav-log"  onclick="goLog()"><span class="nav-icon">📋</span><span class="nav-lbl" id="nl-log">LOG</span></button>
    <button class="nav-btn" id="nav-mine" onclick="goMine()"><span class="nav-icon">📝</span><span class="nav-lbl" id="nl-mine">MINE</span></button>
    <button class="nav-btn" id="nav-new"  onclick="startNew()"><span class="nav-icon" style="font-size:26px;color:var(--accent)">＋</span><span class="nav-lbl" style="color:var(--accent)" id="nl-new">RATE</span></button>
  </div>
</div>
<div class="lang-sheet" id="lang-sheet" onclick="if(event.target===this)closeLangSheet()">
  <div class="lang-panel">
    <div class="lbl" style="margin-bottom:12px">LANGUAGE</div>
    <div class="lang-opt" id="lopt-en" onclick="setLang('en')">🇬🇧 English</div>
    <div class="lang-opt" id="lopt-ar" onclick="setLang('ar')">🇩🇿 العربية</div>
    <div class="lang-opt" id="lopt-fr" onclick="setLang('fr')">🇫🇷 Français</div>
    <div class="lang-opt" id="lopt-es" onclick="setLang('es')">🇪🇸 Español</div>
    <div class="lang-opt" id="lopt-ja" onclick="setLang('ja')">🇯🇵 日本語</div>
    <div class="lang-opt" id="lopt-zh" onclick="setLang('zh')">🇨🇳 中文</div>
  </div>
</div>
<div class="sheet-overlay" id="sheet" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeSheet()">×</button>
    <div id="sheet-content"></div>
  </div>
</div>
<div id="toast"></div>
<script>
// ─── I18N ─────────────────────────────────────────────────────────────────────
const SCORE_LABELS_RAW={10:"Perfect",9:"Excellent",8:"Very Good",7:"Good",6:"Above Avg",5:"Average",4:"Mediocre",3:"Poor",2:"Broken",1:"Unplayable",0:"Useless"};

// ─── LOG PAGE ─────────────────────────────────────────────────────────────────
function renderLog(){
  const t=tx();const el=document.getElementById('page-log');el.innerHTML='';
  const genres=new Set(),platforms=new Set(),perspectives=new Set();
  LOG.forEach(e=>{(e.genres||[]).forEach(g=>genres.add(g));if(e.platform)platforms.add(e.platform);if(e.perspective)perspectives.add(e.perspective);});
  const hasActive=F.genres.size||F.platforms.size||F.perspectives.size||F.topCat.size||Object.values(F.scoreMin).some(v=>v>0);
  const ftBtn=document.createElement('button');
  ftBtn.className='filter-toggle-btn'+(hasActive?' has-active':'');
  ftBtn.innerHTML='⚙ '+(logFilterOpen?t.hide:t.show)+' '+t.filters+(hasActive?' ●':'');
  ftBtn.onclick=()=>{logFilterOpen=!logFilterOpen;renderLog();};
  el.appendChild(ftBtn);
  const fs=document.createElement('div');fs.className='filter-section'+(logFilterOpen?' open':'');
  let qVal='';
  function buildFC(label,items,fk,lblFn){
    if(!items.size)return;
    const g=document.createElement('div');g.style.marginBottom='10px';
    g.innerHTML='<div class="lbl" style="margin-bottom:6px">'+label+'</div>';
    const chips=document.createElement('div');chips.className='fchips';
    [...items].sort().forEach(item=>{
      const ch=document.createElement('span');ch.className='fchip'+(F[fk].has(item)?' on':'');
      ch.textContent=lblFn?lblFn(item):item;
      ch.onclick=()=>{F[fk].has(item)?F[fk].delete(item):F[fk].add(item);ch.classList.toggle('on');refreshFBtn();renderLogList(qVal);};
      chips.appendChild(ch);
    });
    g.appendChild(chips);fs.appendChild(g);
  }
  buildFC(t.genre,genres,'genres',genreLabel);
  buildFC(t.platform,platforms,'platforms');
  buildFC(t.perspective,perspectives,'perspectives',perspLabel);
  // top cat
  const tcDiv=document.createElement('div');tcDiv.style.marginBottom='10px';
  tcDiv.innerHTML='<div class="lbl" style="margin-bottom:6px">TOP CATEGORY</div>';
  const tcChips=document.createElement('div');tcChips.className='fchips';
  Object.keys(CAT_META).forEach(cat=>{
    const m=CAT_META[cat];const ch=document.createElement('span');ch.className='fchip'+(F.topCat.has(cat)?' on':'');
    ch.textContent=m.icon+' '+catLabel(cat);
    ch.onclick=()=>{F.topCat.has(cat)?F.topCat.delete(cat):F.topCat.add(cat);ch.classList.toggle('on');refreshFBtn();renderLogList(qVal);};
    tcChips.appendChild(ch);
  });
  tcDiv.appendChild(tcChips);fs.appendChild(tcDiv);
  // score sliders
  const ssDiv=document.createElement('div');ssDiv.innerHTML='<div class="lbl" style="margin-bottom:6px">MIN SCORE</div>';
  Object.keys(CAT_META).forEach(cat=>{
    const m=CAT_META[cat];if(!F.scoreMin[cat])F.scoreMin[cat]=0;
    const row=document.createElement('div');row.className='sslider-row';
    const lbl=document.createElement('span');lbl.className='sslider-lbl';lbl.textContent=m.icon+' '+catLabel(cat);
    const inp=document.createElement('input');inp.type='range';inp.className='sslider-inp';inp.min=0;inp.max=10;inp.step=0.5;inp.value=F.scoreMin[cat]||0;
    const val=document.createElement('span');val.className='sslider-val';val.textContent=F.scoreMin[cat]>0?F.scoreMin[cat]:'—';
    inp.oninput=()=>{F.scoreMin[cat]=parseFloat(inp.value);val.textContent=F.scoreMin[cat]>0?F.scoreMin[cat]:'—';refreshFBtn();renderLogList(qVal);};
    row.appendChild(lbl);row.appendChild(inp);row.appendChild(val);ssDiv.appendChild(row);
  });
  fs.appendChild(ssDiv);
  const clearBtn=document.createElement('button');clearBtn.style.cssText='font-family:\'Orbitron\',sans-serif;font-size:8px;background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;margin-top:6px';clearBtn.textContent=t.clear;
  clearBtn.onclick=()=>{F={genres:new Set(),platforms:new Set(),perspectives:new Set(),topCat:new Set(),scoreMin:{}};renderLog();};
  fs.appendChild(clearBtn);el.appendChild(fs);
  const sw=document.createElement('div');sw.className='search-wrap';
  const si=document.createElement('input');si.style.cssText='background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:\'Rajdhani\',sans-serif;font-size:16px;font-weight:600;padding:11px 14px;width:100%;outline:none;-webkit-appearance:none';
  si.placeholder=t.search;si.addEventListener('input',e=>{qVal=e.target.value;renderLogList(qVal);});
  sw.appendChild(si);el.appendChild(sw);
  const ri=document.createElement('div');ri.id='log-ri';ri.style.cssText='font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;padding:0 16px 8px';el.appendChild(ri);
  const list=document.createElement('div');list.id='log-list';list.style.padding='0 16px 8px';el.appendChild(list);
  renderLogList('');
  function refreshFBtn(){
    const ha=F.genres.size||F.platforms.size||F.perspectives.size||F.topCat.size||Object.values(F.scoreMin).some(v=>v>0);
    ftBtn.className='filter-toggle-btn'+(ha?' has-active':'');
    ftBtn.innerHTML='⚙ '+(logFilterOpen?t.hide:t.show)+' '+t.filters+(ha?' ●':'');
  }
}
function renderLogList(q){
  const t=tx();const list=document.getElementById('log-list');const ri=document.getElementById('log-ri');if(!list)return;
  const filtered=LOG.filter(e=>{
    if(q&&!e.title.toLowerCase().includes(q.toLowerCase()))return false;
    if(F.genres.size&&!(e.genres||[]).some(g=>F.genres.has(g)))return false;
    if(F.platforms.size&&!F.platforms.has(e.platform))return false;
    if(F.perspectives.size&&!F.perspectives.has(e.perspective))return false;
    if(F.topCat.size){const subs=e.subs||{};const cats=Object.keys(subs).filter(c=>c!=='multiplayer'||e.hasMP);if(!cats.length)return false;const top=cats.reduce((b,c)=>{const sa=subs[c]&&subs[c].length?r2(avg(subs[c].map(x=>x.score))):0;return sa>(subs[b]&&subs[b].length?r2(avg(subs[b].map(x=>x.score))):0)?c:b;},cats[0]);if(!F.topCat.has(top))return false;}
    for(const[cat,minS]of Object.entries(F.scoreMin)){if(!minS)continue;const subs=(e.subs||{})[cat]||[];const cs=subs.length?r2(avg(subs.map(s=>s.score))):0;if(cs<minS)return false;}
    return true;
  });
  if(ri)ri.textContent=filtered.length+' / '+LOG.length+' '+t.games;
  list.innerHTML='';
  if(!filtered.length){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px">'+(LOG.length?t.noMatch:t.noGames)+'</div>';return;}
  filtered.forEach(e=>{
    const clr=sc(e.finalScore);const row=document.createElement('div');row.className='log-row';
    row.innerHTML='<div class="log-bar" style="background:linear-gradient(180deg,'+clr+','+clr+'44)"></div>'
      +'<div class="log-score" style="color:'+clr+'">'+e.finalScore+'</div>'
      +'<div class="log-info"><div class="log-title">'+e.title+'</div>'
      +'<div class="log-meta">'+e.platform+(e.date?' · '+e.date:'')+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">'
      +(e.genres||[]).map(g=>'<span class="gtag" style="color:rgba(255,107,138,.9);border-color:rgba(255,45,107,.3);background:rgba(255,45,107,.07)">'+genreLabel(g)+'</span>').join('')
      +(e.perspective?'<span class="gtag" style="color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.07)">'+perspLabel(e.perspective)+'</span>':'')
      +(e.recommend!=null?'<span style="font-size:12px">'+(e.recommend?'✅':'❌')+'</span>':'')
      +'</div></div>'
      +'<div style="font-family:\'Rajdhani\',sans-serif;font-size:11px;color:'+clr+';font-weight:700;flex-shrink:0">'+slbl(e.finalScore)+'</div>';
    row.onclick=()=>openSheet(e);list.appendChild(row);
  });
}

// ─── GENRE LOGIC ─────────────────────────────────────────────────────────────
function reblend(){
  const {genres,gw,hasMP}=sess;if(!genres.length)return;
  const total=Object.values(gw).reduce((a,b)=>a+b,0);if(!total)return;
  const bl={};
  CATS.forEach(cat=>{let w=0;genres.forEach(g=>{w+=(GENRES[g][cat]||0)*((gw[g]||0)/total);});bl[cat]=Math.round(w);});
  if(!hasMP&&(bl.multiplayer||0)>0){const mp=bl.multiplayer;bl.multiplayer=0;const ks=CATS.filter(k=>k!=='multiplayer');const pk=Math.floor(mp/ks.length);ks.forEach(k=>{bl[k]=(bl[k]||0)+pk;});bl[ks[0]]=(bl[ks[0]]||0)+mp-pk*ks.length;}
  const sum=Object.values(bl).reduce((a,b)=>a+b,0);if(sum!==100)bl[CATS[0]]=(bl[CATS[0]]||0)+(100-sum);
  sess.fw=bl;
}
function toggleGenre(g){
  if(sess.genres.includes(g))sess.genres=sess.genres.filter(x=>x!==g);
  else if(sess.genres.length<3)sess.genres.push(g);
  else return;
  if(!sess.genres.length){sess.gw={};sess.fw={};return;}
  const even=Math.floor(100/sess.genres.length),rem=100-even*sess.genres.length;
  sess.gw={};sess.genres.forEach((genre,i)=>{sess.gw[genre]=even+(i===0?rem:0);});
  reblend();
}
function adjWeight(g,val){
  const others=sess.genres.filter(x=>x!==g);
  const rem=100-val,tot=others.reduce((a,x)=>a+(sess.gw[x]||0),0);
  sess.gw[g]=val;
  if(tot>0)others.forEach(x=>{sess.gw[x]=Math.round((sess.gw[x]/tot)*rem);});
  else{const ev=Math.floor(rem/others.length);others.forEach((x,i)=>{sess.gw[x]=ev+(i===0?rem-ev*others.length:0);});}
  reblend();
}
function initSubs(){
  if(Object.keys(sess.subs).length)return;
  CATS.filter(c=>c!=='multiplayer'||sess.hasMP).forEach(cat=>{sess.subs[cat]=CAT_META[cat].subs.map(n=>({name:n,score:5}));});
}
const aCats=()=>CATS.filter(c=>c!=='multiplayer'||sess.hasMP);
const catScore=cat=>{const s=sess.subs[cat]||[];return s.length?r2(avg(s.map(x=>x.score))):5;};
const finalScore=()=>r2(aCats().reduce((acc,c)=>acc+catScore(c)*(sess.fw[c]||0)/100,0));

// ─── SLIDERS ──────────────────────────────────────────────────────────────────
function neonSlider(val,color,onChange){
  const pct=val*10;
  const wrap=document.createElement('div');wrap.className='ns-wrap';
  const track=document.createElement('div');track.className='ns-track';
  const bg=h('<div class="ns-bg"></div>');
  const fill=document.createElement('div');fill.className='ns-fill';
  fill.style.cssText='width:'+pct+'%;background:linear-gradient(90deg,rgba(255,45,107,.4),'+color+');box-shadow:0 0 6px '+color+'66';
  const thumb=document.createElement('div');thumb.className='ns-thumb';
  thumb.style.cssText='left:'+pct+'%;background:radial-gradient(circle at 35% 35%,#fff,'+color+');box-shadow:0 0 0 2px '+color+'44,0 0 10px '+color+'88';
  const valEl=document.createElement('div');valEl.className='ns-val';valEl.style.color=sc(val);valEl.textContent=val;
  const lblEl=document.createElement('div');lblEl.className='ns-lbl';lblEl.textContent=slbl(val);
  track.append(bg,fill,thumb);wrap.append(track,valEl,lblEl);
  const calc=clientX=>{const r=track.getBoundingClientRect();return Math.round(Math.max(0,Math.min(1,(clientX-r.left)/r.width))*10/0.5)*0.5;};
  const upd=v=>{const p=v*10;fill.style.width=p+'%';thumb.style.left=p+'%';valEl.textContent=v;valEl.style.color=sc(v);lblEl.textContent=slbl(v);onChange(v);};
  track.addEventListener('mousedown',e=>{e.preventDefault();upd(calc(e.clientX));const mv=e2=>upd(calc(e2.clientX));const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);});
  track.addEventListener('touchstart',e=>{upd(calc(e.touches[0].clientX));const mv=e2=>upd(calc(e2.touches[0].clientX));const up=()=>{window.removeEventListener('touchmove',mv);window.removeEventListener('touchend',up);};window.addEventListener('touchmove',mv,{passive:true});window.addEventListener('touchend',up);},{passive:true});
  return wrap;
}
function setFill(inp,v){inp.style.background='linear-gradient(90deg,#ff2d6b '+v+'%,rgba(255,255,255,.07) '+v+'%)';}
function percentSlider(val,onChange){
  const inp=document.createElement('input');inp.type='range';inp.min=0;inp.max=100;inp.step=1;inp.value=val;inp.className='ps-inp';
  setFill(inp,val);
  inp.addEventListener('input',e=>{const v=parseInt(e.target.value);setFill(inp,v);onChange(v,inp);});
  return inp;
}

  body.innerHTML='<div class="stag">// STEP 04</div><div class="stitle">RESULT</div>';
  const hero=document.createElement('div');hero.className='result-hero';
  hero.innerHTML='<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">'+sess.platform+(sess.date?' // '+sess.date:'')+'</div><div style="font-family:\'Orbitron\',sans-serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:16px;line-height:1.2">'+sess.title+'</div><div style="display:flex;align-items:flex-end;justify-content:space-between"><div><div class="score-glow" style="font-family:\'Orbitron\',sans-serif;font-size:56px;font-weight:900;color:'+sc(fs)+';line-height:1">'+fs.toFixed(2)+'</div><div style="font-family:\'Rajdhani\',sans-serif;font-size:13px;color:'+sc(fs)+';margin-top:4px;font-weight:700">'+slbl(fs)+'</div></div><div style="text-align:right"><div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;margin-bottom:6px">'+sess.genres.map(g=>'<span style="font-size:10px;background:rgba(255,45,107,.12);color:rgba(255,107,138,.9);padding:3px 8px;border-radius:4px;border:1px solid rgba(255,45,107,.3);font-family:\'Rajdhani\',sans-serif;font-weight:700">'+genreLabel(g)+'</span>').join('')+'</div>'+(sess.recommend!=null?'<div style="font-family:\'Rajdhani\',sans-serif;font-size:13px;font-weight:700;color:'+(sess.recommend?'#4ade80':'#ff4d6d')+'">'+(sess.recommend?'✅ Rec':'❌ No')+'</div>':'')+'</div></div>';
  body.appendChild(hero);
  const grid=document.createElement('div');grid.style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px';
  ac.forEach(cat=>{
    const cs=catScore(cat),w=sess.fw[cat]||0,m=CAT_META[cat];
    const c=document.createElement('div');c.style.cssText='background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;overflow:hidden';
    c.innerHTML='<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,'+m.color+',transparent)"></div><div style="font-family:\'Orbitron\',sans-serif;font-size:7px;color:'+m.color+';letter-spacing:1px;margin-bottom:6px;padding-top:4px">'+m.icon+' '+m.label.toUpperCase()+'</div><div style="display:flex;justify-content:space-between;align-items:flex-end"><div style="font-family:\'Orbitron\',sans-serif;font-size:20px;font-weight:900;color:'+sc(cs)+'">'+cs+'</div><div style="text-align:right"><div style="font-family:\'Share Tech Mono\',monospace;font-size:8px;color:var(--muted)">w:'+w+'%</div><div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:'+m.color+'88">+'+(cs*w/100).toFixed(2)+'</div></div></div><div style="height:2px;background:rgba(255,255,255,.05);border-radius:1px;margin-top:8px"><div style="height:100%;width:'+cs*10+'%;background:'+m.color+';border-radius:1px;opacity:.7"></div></div>';
    grid.appendChild(c);
  });
  body.appendChild(grid);
  if(sess.verdict){const vd=document.createElement('div');vd.className='card';vd.style.marginBottom='16px';vd.innerHTML='<div class="lbl">VERDICT</div><div style="font-family:\'Rajdhani\',sans-serif;font-size:14px;color:#c0c0d8;line-height:1.5">'+sess.verdict+'</div>';body.appendChild(vd);}
  body.appendChild(document.createElement('div')).className='div';
  const btnRow=document.createElement('div');btnRow.className='btn-row';
  const bk=document.createElement('button');bk.className='btn btn-ghost';bk.textContent='← EDIT';bk.onclick=()=>setStep('rate');
  const sv=document.createElement('button');sv.className='btn btn-primary';sv.textContent='💾 SAVE';sv.onclick=saveEntry;
  btnRow.append(bk,sv);body.appendChild(btnRow);
}

// ─── SAVE TO LOCALSTORAGE ─────────────────────────────────────────────────────
function saveEntry(){
  const fs=finalScore();
  const entry={id:sess.editId||Date.now(),savedAt:new Date().toISOString(),title:sess.title,platform:sess.platform,date:sess.date,playTime:sess.playTime,perspective:sess.perspective,hasMP:sess.hasMP,genres:[...sess.genres],gw:{...sess.gw},fw:{...sess.fw},subs:JSON.parse(JSON.stringify(sess.subs)),notes:{...sess.notes},verdict:sess.verdict,recommend:sess.recommend,finalScore:parseFloat(fs.toFixed(2))};
  if(sess.editId)MINE=MINE.map(e=>String(e.id)===String(sess.editId)?entry:e);else MINE.unshift(entry);
  saveMine();resetSess();toast('Saved!');goMine();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fld(parent,label,inputEl){
  const w=document.createElement('div');w.className='form-field';
  w.innerHTML='<div class="lbl">'+label+'</div>';w.appendChild(inputEl);parent.appendChild(w);
}
function inp(type,val,placeholder,onChange,large){
  const i=document.createElement('input');i.type=type;i.value=val;i.placeholder=placeholder;
  if(large)i.style.cssText='font-size:18px;font-weight:700;padding:14px';
  i.addEventListener('input',e=>onChange(e.target.value));return i;
}

console.log('Backlog Therapy v3 loaded ✓ — wizard ready');
loadMine();
const savedLang=localStorage.getItem('bt_lang')||'en';
setLang(savedLang);
loadLog();
renderHome();
</script>
